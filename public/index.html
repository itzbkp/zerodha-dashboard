<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zerodha Dashboard</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #111111;
        color: #d4d4d4;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        font-variant-numeric: tabular-nums;
      }

      .status-sep {
        font-size: 32px;
        line-height: 0;
        vertical-align: middle;
        position: relative;
        top: -0.5px;
      }
      .delete-confirm-text {
        font-size: 13px;
        color: #b0b0b0;
        margin-bottom: 16px;
      }
      .tag-pill-wrap {
        display: inline-flex;
        align-items: stretch;
        border-radius: 20px;
        overflow: hidden;
      }
      .tag-pill-name {
        padding: 5px 12px;
        font-size: 13px;
        white-space: nowrap;
        display: flex;
        align-items: center;
      }
      .tag-pill-count {
        padding: 5px 12px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
      }
      .tag-pill-action {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 10px;
        cursor: pointer;
      }
      .tag-pill-action .icon-sm {
        font-size: 13px;
        line-height: 0;
      }
      .tag-pill-action .icon-x {
        font-size: 19px;
        line-height: 0;
        position: relative;
        top: -1px;
      }
      .tag-actions-wrap {
        display: inline-flex;
        align-items: stretch;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #4a4a4a;
      }
      .tag-actions-wrap .chip {
        border: none !important;
        border-radius: 0;
      }
      .tag-actions-wrap .chip + .chip {
        border-left: 1px solid #4a4a4a !important;
      }
      .icon-plus {
        font-size: 22px;
        line-height: 0;
        position: relative;
        top: -2px;
      }
      .icon-edit {
        font-size: 13px;
        line-height: 0;
        position: relative;
        top: -1px;
      }
      .no-tags-msg {
        color: #6a6a6a;
        font-size: 13px;
      }
      .tag-section-divider {
        width: 100%;
        border-top: 1px solid #4a4a4a;
        margin: 6px 0 2px;
      }

      /* ── Header ── */
      .header {
        background: #111111;
        border-bottom: 1px solid #4a4a4a;
        padding: 14px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
      }
      .logo h1 {
        font-size: 17px;
        font-weight: 600;
        color: #e8e8e8;
      }
      .header-search {
        flex: 1;
        max-width: 600px;
        margin: 0 16px;
      }
      .search-box {
        position: relative;
      }
      .search-box input {
        width: 100%;
        padding: 8px 50px 8px 34px;
        border: 1px solid #4a4a4a;
        border-radius: 8px;
        font-size: 13px;
        background: #161616;
        color: #d4d4d4;
        outline: none;
        font-family: inherit;
      }
      .search-box input::placeholder {
        color: #6a6a6a;
      }
      .search-box input:focus {
        border-color: #387ed1;
        box-shadow: 0 0 0 3px rgba(56, 126, 209, 0.15);
      }
      .search-box svg {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #6a6a6a;
      }
      .search-box .search-count {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #6a6a6a;
        font-size: 12px;
        pointer-events: none;
        white-space: nowrap;
        width: 50px;
        text-align: right;
      }
      .status-pill {
        font-size: 12px;
        color: #ffffff;
        background: #1a1a1a;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #4a4a4a;
        user-select: none;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
      }
      .dot-live {
        background: #4caf50;
        animation: pulse 2s infinite;
        position: relative;
        top: -0.35px;
      }
      .stat-clickable {
        cursor: pointer;
        transition: background 0.15s;
      }
      .stat-clickable:hover {
        background: #1c1c1c;
      }
      .stat-pnl-g:hover {
        background: rgba(76, 175, 80, 0.12);
      }
      .stat-pnl-r:hover {
        background: rgba(244, 67, 54, 0.12);
      }
      #stat-invested:hover {
        background: rgba(56, 126, 209, 0.12);
      }
      #stat-current:hover {
        background: rgba(251, 192, 45, 0.12);
      }
      #stat-invested.weight-active {
        box-shadow: inset 0 -3px 0 0 #387ed1;
      }
      #stat-current.weight-active {
        box-shadow: inset 0 -3px 0 0 #fbc02d;
      }
      .stat-pnl-g.weight-active {
        box-shadow: inset 0 -3px 0 0 #4caf50;
      }
      .stat-pnl-r.weight-active {
        box-shadow: inset 0 -3px 0 0 #f44336;
      }
      .dot-err {
        background: #f44336;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ── Summary ── */
      .summary {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: #111111;
        border-bottom: 1px solid #4a4a4a;
      }
      .stat {
        padding: 18px 24px;
        border-right: 1px solid #4a4a4a;
      }
      .stat:last-child {
        border-right: none;
      }
      .stat .lbl {
        font-size: 12px;
        color: #8a8a8a;
        margin-bottom: 10px;
      }
      .stat .lbl-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
      }
      .stat .lbl-row .lbl {
        margin-bottom: 0;
      }
      .val {
        font-size: 26px;
        font-weight: 500;
        color: #e8e8e8;
        line-height: 1;
        display: flex;
        align-items: baseline;
      }
      .val .dec {
        font-size: 14px;
        font-weight: 400;
        color: #8a8a8a;
      }
      .val-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        margin-top: 2px;
      }
      .pct-badge {
        font-size: 12px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 4px;
        align-self: flex-end;
        position: relative;
      }
      .pct-badge .tooltip {
        position: absolute;
        bottom: 100%;
        margin-bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1a1a;
        border: 1px solid #4a4a4a;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.15s;
        pointer-events: none;
        z-index: 50;
      }
      .pct-badge .tooltip::before,
      .pct-badge .tooltip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-style: solid;
      }
      .pct-badge .tooltip::before {
        border-width: 6px;
        border-color: #4a4a4a transparent transparent transparent;
      }
      .pct-badge .tooltip::after {
        border-width: 5.75px;
        margin-top: -1px;
        border-color: #1a1a1a transparent transparent transparent;
      }
      .pct-badge:hover .tooltip {
        opacity: 1;
        visibility: visible;
      }
      .pct-g {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
      }
      .pct-r {
        background: rgba(244, 67, 54, 0.15);
        color: #f44336;
      }
      .g {
        color: #4caf50;
      }
      .r {
        color: #f44336;
      }

      /* ── Table ── */
      .table-container {
        margin: 16px 28px 20px;
      }
      .filter-row {
        display: flex;
        align-items: end;
        justify-content: end;
        gap: 6px;
        margin-bottom: 12px;
        min-height: 64px;
      }
      .filter-row-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        flex: 1;
      }
      .filter-row-actions {
        position: absolute;
      }
      .table-wrap {
        background: #111111;
        border-radius: 12px;
        border: 1px solid #4a4a4a;
        overflow: hidden;
      }
      .table-scroll {
        overflow-y: scroll;
        max-height: 400px;
        overflow-x: auto;
        scrollbar-gutter: stable;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        table-layout: fixed;
      }
      thead {
        position: sticky;
        top: 0;
        z-index: 10;
      }
      th {
        padding: 11px 14px;
        text-align: left;
        font-size: 11px;
        font-weight: 500;
        color: #8a8a8a;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        background: #111111;
        border-bottom: 1px solid #4a4a4a;
      }
      th:hover {
        color: #c0c0c0;
      }
      th .si {
        display: inline-block;
        width: 14px;
        margin-left: 4px;
        font-size: 9px;
        text-align: center;
      }
      th.asc .si,
      th.desc .si {
        color: lightskyblue;
      }
      th .si.si-red {
        color: lightcoral;
      }
      th .si.si-green {
        color: lightgreen;
      }
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #3a3a3a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #d4d4d4;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: #2a2a2a;
      }
      tbody tr {
        cursor: pointer;
      }
      .sym {
        font-weight: 500;
        color: #e8e8e8;
      }
      .pos {
        color: #4caf50;
      }
      .neg {
        color: #f44336;
      }
      .pp {
        color: #4caf50;
        font-weight: 500;
      }
      .pn {
        color: #f44336;
        font-weight: 500;
      }

      /* ── Chips ── */
      .chip {
        font-size: 13px;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #4a4a4a;
        background: #161616;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .chip:hover {
        border-color: #5b8def;
        color: #5b8def;
      }
      .chip.add-tag-chip {
        border-style: dashed;
        border-color: #5a5a5a;
      }
      .chip.add-tag-chip:hover {
        border-color: #5b8def;
        color: #5b8def;
      }
      .chip.add-tag-chip.active {
        background: #2d5fc4;
        border-color: #2d5fc4;
        border-style: solid;
        color: #fff;
      }
      .chip.edit-toggle-chip:hover {
        color: #5b8def;
      }
      .chip.edit-toggle-chip.active {
        background: #2d5fc4;
        color: #fff;
      }
      .grouped-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 6px 14px;
        cursor: pointer;
        user-select: none;
        font-size: 13px;
      }

      /* ── Modals ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #161616;
        border: 1px solid #4a4a4a;
        border-radius: 14px;
        padding: 8px 12px 12px;
        width: 400px;
        max-width: 95vw;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .modal-header h3 {
        font-size: 15px;
        font-weight: 600;
        color: #e8e8e8;
      }
      .modal-close {
        font-size: 26px;
        color: #6a6a6a;
        cursor: pointer;
        line-height: 1;
      }
      .modal-close:hover {
        color: #b0b0b0;
      }
      .tag-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag-pill-toggle {
        font-size: 12px;
        padding: 5px 13px;
        border-radius: 20px;
        border: 1.5px solid #4a4a4a;
        background: #1a1a1a;
        color: #b0b0b0;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
        font-family: inherit;
        font-weight: 500;
      }
      .tag-pill-toggle:hover {
        border-color: #5b8def;
        color: #5b8def;
      }
      .tag-pill-toggle.selected {
        background: #2d5fc4;
        border-color: #2d5fc4;
        color: #fff;
      }
      .tag-cash {
        background: darkmagenta;
        border-color: darkmagenta;
        color: #fff;
        pointer-events: none;
        cursor: default;
        opacity: 0.65;
      }
      .add-tag-row {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }
      .add-tag-row input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #4a4a4a;
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        color: #d4d4d4;
        background: #1a1a1a;
      }
      .add-tag-row input::placeholder {
        color: #6a6a6a;
      }
      .add-tag-row input:focus {
        border-color: #2d5fc4;
        box-shadow: 0 0 0 3px rgba(45, 95, 196, 0.15);
      }
      .btn-add {
        padding: 8px 16px;
        background: #2d5fc4;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      .btn-add:hover {
        background: #244ea0;
      }

      /* ── Toast ── */
      .toast-container {
        position: fixed;
        top: 16px;
        left: 50%;
        translate: -50% 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 200;
      }
      .toast {
        position: relative;
        background: #1a1a1a;
        border: 1px solid #f44336;
        color: #f44336;
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        animation: toast 2s ease-in-out forwards;
        max-width: 600px;
      }
      .toast::before,
      .toast::after {
        content: "";
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-style: solid;
      }
      .toast::before {
        border-width: 8px;
        border-color: transparent transparent #f44336 transparent;
      }
      .toast::after {
        border-width: 8px;
        margin-bottom: -1px;
        border-color: transparent transparent #1a1a1a transparent;
      }
      @keyframes toast {
        0% {
          opacity: 0;
          transform: translateY(0px);
        }
        10% {
          opacity: 1;
          transform: translateY(16px);
        }
        90% {
          opacity: 1;
          transform: translateY(16px);
        }
        100% {
          opacity: 0;
          transform: translateY(0px);
        }
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        height: 6px;
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #111111;
      }
      ::-webkit-scrollbar-thumb {
        background: #4a4a4a;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a3a3a;
      }

      /* ── Responsive ── */
      @media (max-width: 700px) {
        .summary {
          grid-template-columns: 1fr 1fr;
        }
        .table-container {
          margin: 12px;
        }
        .header {
          padding: 12px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="dashboard">
      <div class="header">
        <a
          class="logo"
          href="https://kite.zerodha.com/holdings/equity"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="favicon.ico" alt="Zerodha Logo" width="32" height="32" />
          <h1>Zerodha Dashboard</h1>
        </a>
        <div class="header-search">
          <div class="search-box">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input
              autofocus
              type="text"
              id="search"
              placeholder="Search by symbol or tag"
              oninput="renderTable()"
            />
            <span class="search-count" id="search-count">0/0</span>
          </div>
        </div>
        <div class="status-pill" id="status-pill">
          <span class="status-dot dot-live" id="sdot"></span>Live&nbsp;<span
            class="status-sep"
            >·</span
          >&nbsp;<span id="ts-text">00:00:00 AM</span>
        </div>
      </div>

      <div class="summary">
        <div
          class="stat stat-clickable"
          id="stat-invested"
          onclick="setWeightMode('invested')"
        >
          <div class="lbl-row">
            <span class="lbl">Total Investment</span>
          </div>
          <div class="val-row">
            <div class="val" id="inv">
              <span>0</span><span class="dec">.00</span>
            </div>
          </div>
        </div>
        <div
          class="stat stat-clickable"
          id="stat-current"
          onclick="setWeightMode('current')"
        >
          <div class="lbl-row">
            <span class="lbl">Current Value</span>
          </div>
          <div class="val-row">
            <div class="val" id="cur">
              <span>0</span><span class="dec">.00</span>
            </div>
          </div>
        </div>
        <div
          class="stat stat-clickable"
          id="stat-day"
          onclick="setWeightMode('day')"
        >
          <div class="lbl-row">
            <span class="lbl">Day's P&amp;L</span>
            <span class="pct-badge pct-r" id="tdc-breadth">0.00 ▼</span>
          </div>
          <div class="val-row">
            <div class="val g" id="tdc">
              <span>0</span><span class="dec">.00</span>
            </div>
            <span class="pct-badge pct-g" id="tdc-pct">+0.00%</span>
          </div>
        </div>
        <div
          class="stat stat-clickable"
          id="stat-total"
          onclick="setWeightMode('total')"
        >
          <div class="lbl-row">
            <span class="lbl">Total P&amp;L</span>
            <span class="pct-badge pct-r" id="pnl-breadth">0.00 ▼</span>
          </div>
          <div class="val-row">
            <div class="val g" id="pnl">
              <span>0</span><span class="dec">.00</span>
            </div>
            <span class="pct-badge pct-g" id="pnl-pct">+0.00%</span>
          </div>
        </div>
      </div>

      <div class="table-container">
        <div class="filter-row">
          <div class="filter-row-tags" id="tag-filters"></div>
          <div class="filter-row-actions" id="tag-actions"></div>
        </div>
        <div class="table-wrap">
          <div class="table-scroll">
            <table>
              <colgroup>
                <col style="width: 12.5%" />
                <col style="width: 7.4375%" />
                <col style="width: 11.4375%" />
                <col style="width: 11.4375%" />
                <col style="width: 11.4375%" />
                <col style="width: 11.4375%" />
                <col style="width: 11.4375%" />
                <col style="width: 11.4375%" />
                <col style="width: 11.4375%" />
              </colgroup>
              <thead id="th">
                <tr>
                  <th class="" onclick="cycleSort('tradingsymbol')">
                    Symbol<span class="si"></span>
                  </th>
                  <th class="" onclick="cycleSort('quantity')">
                    Qty.<span class="si"></span>
                  </th>
                  <th class="" onclick="cycleSort('_inv')">
                    Invested<span class="si"></span>
                  </th>
                  <th class="" onclick="cycleSort('average_price')">
                    Avg. cost<span class="si"></span>
                  </th>
                  <th class="" onclick="cycleSort('last_price')">
                    LTP<span class="si"></span>
                  </th>
                  <th class="" onclick="cycleSort('_wt')">
                    Wt.<span class="si"></span>
                  </th>
                  <th class="" onclick="cycleSort('pnl')">
                    P&amp;L<span class="si"></span>
                  </th>
                  <th class="" onclick="cycleSort('_ret')">
                    Net chg.<span class="si"></span>
                  </th>
                  <th class="desc" onclick="cycleSort('day_change_percentage')">
                    Day chg.<span class="si">▼</span>
                  </th>
                </tr>
              </thead>
              <tbody id="tb"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Assign tags modal -->
    <div class="modal-overlay" id="assign-modal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="assign-modal-title">Assign Tags</h3>
          <span class="modal-close" onclick="closeAssignModal()">×</span>
        </div>
        <div class="tag-pills" id="assign-tag-pills"></div>
      </div>
    </div>

    <!-- Add tag modal -->
    <div class="modal-overlay" id="addtag-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Add New Tag</h3>
          <span class="modal-close" onclick="closeAddTagModal()">×</span>
        </div>
        <div class="add-tag-row">
          <input
            type="text"
            id="new-tag-input"
            placeholder="Tag name"
            onkeydown="if (event.key === 'Enter') createTag();"
          />
          <button class="btn-add" onclick="createTag()">Add</button>
        </div>
      </div>
    </div>

    <!-- Rename tag modal -->
    <div class="modal-overlay" id="renametag-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Rename Tag</h3>
          <span class="modal-close" onclick="closeRenameTagModal()">×</span>
        </div>
        <div class="add-tag-row">
          <input
            type="text"
            id="rename-tag-input"
            placeholder="New tag name…"
            onkeydown="if (event.key === 'Enter') confirmRenameTag();"
          />
          <button class="btn-add" onclick="confirmRenameTag()">Rename</button>
        </div>
      </div>
    </div>

    <!-- Delete tag confirmation modal -->
    <div class="modal-overlay" id="delete-confirm-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Delete Tag</h3>
          <span class="modal-close" onclick="closeDeleteConfirmModal()">×</span>
        </div>
        <p id="delete-confirm-text" class="delete-confirm-text"></p>
        <div class="add-tag-row">
          <button
            class="btn-add"
            id="delete-confirm-btn"
            style="background: #c4302d; flex: 1"
            onclick="confirmDeleteTag()"
          >
            Delete
          </button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
      // ── State ─────────────────────────────────────────
      let H = [];
      let holdingsLoaded = false;
      let sCol = "day_change_percentage",
        sDir = -1;
      let retSortMode = 0; // 0 = no sort, 1 = red (losers) first, 2 = green (gainers) first
      let cleanupDone = false;
      let activeTagFilters = new Set();
      let autoTagFilters = new Set();
      let editingSymbol = null;
      let editModeOn = false;
      let addTagModalOpen = false;
      let globalTags = [];
      let stockTags = {};
      let weightMode = "day"; // "invested" | "current" | "day" | "total"

      function setWeightMode(mode) {
        weightMode = mode;
        ["invested", "current", "day", "total"].forEach((m) => {
          const el = document.getElementById(`stat-${m}`);
          if (el) el.classList.toggle("weight-active", m === mode);
        });
        renderTable();
      }

      // ── localStorage cache ────────────────────────────
      // "tags"       → string[]              (mirrors `tags` table)
      // "stock_tags" → { symbol: string[] }  (mirrors `stock_tags` table)
      function loadTagsFromCache() {
        try {
          const rawTags = localStorage.getItem("tags");
          const rawStockTags = localStorage.getItem("stock_tags");
          if (!rawTags && !rawStockTags) return false;
          globalTags = rawTags ? JSON.parse(rawTags) : [];
          stockTags = rawStockTags ? JSON.parse(rawStockTags) : {};
          return true;
        } catch (e) {
          return false;
        }
      }
      function persistTagsCache() {
        localStorage.setItem("tags", JSON.stringify(globalTags));
        localStorage.setItem("stock_tags", JSON.stringify(stockTags));
        renderTagFilterRow();
      }

      // ── Toast ─────────────────────────────────────────
      // Claude.ai renders artifacts inside a sandboxed iframe, so
      // window.self !== window.top there. Your real deployment (served
      // directly by server.js) is loaded in a top-level tab, where this is
      // false. Cross-origin access to window.top can throw inside some
      // sandboxes too, which we also treat as "running inside an artifact".
      const IS_ARTIFACT_ENV = (() => {
        try {
          return window.self !== window.top;
        } catch (e) {
          return true;
        }
      })();

      function showToast(message) {
        if (IS_ARTIFACT_ENV) return;
        const el = document.createElement("div");
        el.className = "toast";
        el.textContent = message;
        document.getElementById("toast-container").appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }

      // ── Formatting ────────────────────────────────────
      function fmtVal(n) {
        const [int, dec] = Math.abs(n).toFixed(2).split(".");
        return `<span>${Number(int).toLocaleString("en-IN")}</span><span class="dec">.${dec}</span>`;
      }
      const fc = (n) =>
        Math.abs(n).toLocaleString("en-IN", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      const fi = (n) => Math.round(Math.abs(n)).toLocaleString("en-IN");

      // ── Status / clock ────────────────────────────────
      function setStatus(ok) {
        const d = new Date();
        const h = d.getHours() % 12 || 12;
        const m = String(d.getMinutes()).padStart(2, "0");
        const s = String(d.getSeconds()).padStart(2, "0");
        const ap = d.getHours() >= 12 ? "PM" : "AM";
        const ts = `${String(h).padStart(2, "0")}:${m}:${s} ${ap}`;
        const pill = document.getElementById("status-pill");
        if (pill) {
          pill.innerHTML = `<span class="status-dot ${ok ? "dot-live" : "dot-err"}" id="sdot"></span>${ok ? "Live" : "Offline"}&nbsp;<span class="status-sep">·</span>&nbsp;<span id="ts-text">${ts}</span>`;
        }
      }

      // ── API: Holdings ─────────────────────────────────
      async function fetchHoldings() {
        try {
          const res = await fetch("/portfolio/holdings");
          const json = await res.json();
          const isApiFailure = json.status === "error";
          if (json.status === "Login-Required") {
            setStatus(false);
            window.location.href = "/login";
            return;
          }
          const raw = json.data || [];
          H = raw.map((h) => ({
            ...h,
            _inv: h.quantity * h.average_price,
            _cur: h.quantity * h.last_price,
            _ret: ((h.last_price - h.average_price) / h.average_price) * 100
          }));
          const _totalInv = H.reduce((a, h) => a + h._inv, 0);
          const _totalCur = H.reduce((a, h) => a + h._cur, 0);
          const _totalDayPnl = H.reduce(
            (a, h) => a + h.day_change * h.quantity,
            0
          );
          const _totalPnl = H.reduce((a, h) => a + h.pnl, 0);
          H = H.map((h) => ({
            ...h,
            _wtInvested: _totalInv !== 0 ? (h._inv / _totalInv) * 100 : 0,
            _wtCurrent: _totalCur !== 0 ? (h._cur / _totalCur) * 100 : 0,
            _wtDay:
              _totalDayPnl !== 0
                ? ((h.day_change * h.quantity) / _totalDayPnl) * 100
                : 0,
            _wtTotal: _totalPnl !== 0 ? (h.pnl / _totalPnl) * 100 : 0
          }));
          holdingsLoaded = isApiFailure ? false : true;
          setStatus(!isApiFailure);
          if (isApiFailure)
            showToast(json.message || "Failed to fetch holdings");
          renderSummary();
          renderTagFilterRow();
          renderTable();
          if (!cleanupDone) {
            cleanupDone = true;
            runCleanup();
          }
        } catch (e) {
          setStatus(false);
          showToast(e.message || "Failed to fetch holdings");
        }
      }

      // ── API: Tags (GET) ───────────────────────────────
      async function loadTagsFromServer() {
        try {
          const res = await fetch("/api/tags");
          const data = await res.json();
          if (data.status !== "error") {
            globalTags = (data.tags || []).map((t) => t.name);
            stockTags = data.stockTags || {};
            persistTagsCache();
          } else {
            showToast(data.message || "Failed to load tags");
          }
        } catch (e) {
          showToast(e.message || "Failed to load tags");
        }
      }

      // ── API: Cleanup ──────────────────────────────────
      async function runCleanup() {
        try {
          const symbols = H.map((h) => h.tradingsymbol);
          if (!symbols.length) return;
          const res = await fetch("/api/cleanup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ symbols })
          });
          if (!res.ok) throw new Error("Failed to run cleanup");
        } catch (e) {
          showToast(e.message || "Failed to run cleanup");
        }
      }

      // ── Render: Summary ───────────────────────────────
      function renderSummary() {
        let ti = 0,
          tc = 0,
          tdc = 0,
          tp = 0;
        H.forEach((h) => {
          ti += h._inv;
          tc += h._cur;
          tdc += h.day_change * h.quantity;
          tp += h.pnl;
        });
        const pp = (tp / ti) * 100 || 0;
        const dcPct = (tdc / (tc - tdc)) * 100 || 0;

        document.getElementById("inv").innerHTML = fmtVal(ti);
        document.getElementById("cur").innerHTML = fmtVal(tc);

        const tdcEl = document.getElementById("tdc");
        tdcEl.innerHTML = (tdc < 0 ? "-" : "") + fmtVal(tdc);
        tdcEl.className = "val " + (tdc >= 0 ? "g" : "r");
        const statDayEl = document.getElementById("stat-day");
        statDayEl.className =
          "stat stat-clickable " +
          (tdc >= 0 ? "stat-pnl-g" : "stat-pnl-r") +
          (statDayEl.classList.contains("weight-active")
            ? " weight-active"
            : "");
        const tdcB = document.getElementById("tdc-pct");
        const dayGainerAmt = H.filter((h) => h.day_change >= 0).reduce(
          (a, h) => a + h.day_change * h.quantity,
          0
        );
        const dayLoserAmt = Math.abs(
          H.filter((h) => h.day_change < 0).reduce(
            (a, h) => a + h.day_change * h.quantity,
            0
          )
        );
        const dayGainerInv = H.filter((h) => h.day_change >= 0).reduce(
          (a, h) => a + h._inv,
          0
        );
        const dayLoserInv = H.filter((h) => h.day_change < 0).reduce(
          (a, h) => a + h._inv,
          0
        );
        const dayGainerPct = (dayGainerAmt / dayGainerInv) * 100 || 0;
        const dayLoserPct = (dayLoserAmt / dayLoserInv) * 100 || 0;
        tdcB.innerHTML = `${dcPct >= 0 ? "+" : ""}${dcPct.toFixed(2)}%<span class="tooltip"><span class="g">${dayGainerPct.toFixed(2)}% ↑</span> <span class="r">${dayLoserPct.toFixed(2)}% ↓</span></span>`;
        tdcB.className = "pct-badge " + (tdc >= 0 ? "pct-g" : "pct-r");

        const pnlEl = document.getElementById("pnl");
        pnlEl.innerHTML = (tp < 0 ? "-" : "") + fmtVal(tp);
        pnlEl.className = "val " + (tp >= 0 ? "g" : "r");
        const statTotalEl = document.getElementById("stat-total");
        statTotalEl.className =
          "stat stat-clickable " +
          (tp >= 0 ? "stat-pnl-g" : "stat-pnl-r") +
          (statTotalEl.classList.contains("weight-active")
            ? " weight-active"
            : "");
        const pnlB = document.getElementById("pnl-pct");
        const netGainerAmt = H.filter((h) => h.pnl >= 0).reduce(
          (a, h) => a + h.pnl,
          0
        );
        const netLoserAmt = Math.abs(
          H.filter((h) => h.pnl < 0).reduce((a, h) => a + h.pnl, 0)
        );
        const netGainerInv = H.filter((h) => h.pnl >= 0).reduce(
          (a, h) => a + h._inv,
          0
        );
        const netLoserInv = H.filter((h) => h.pnl < 0).reduce(
          (a, h) => a + h._inv,
          0
        );
        const netGainerPct = (netGainerAmt / netGainerInv) * 100 || 0;
        const netLoserPct = (netLoserAmt / netLoserInv) * 100 || 0;
        pnlB.innerHTML = `${pp >= 0 ? "+" : ""}${pp.toFixed(2)}%<span class="tooltip"><span class="g">${netGainerPct.toFixed(2)}% ↑</span> <span class="r">${netLoserPct.toFixed(2)}% ↓</span></span>`;
        pnlB.className = "pct-badge " + (tp >= 0 ? "pct-g" : "pct-r");

        // ── Market breadth (with hover tooltip showing raw up/down counts) ──
        const totalCount = H.length || 0;
        const dayGainers = H.filter((h) => h.day_change >= 0).length;
        const totalGainers = H.filter((h) => h.pnl >= 0).length;
        const dayBreadthPct = (dayGainers / totalCount) * 100 || 0;
        const totalBreadthPct = (totalGainers / totalCount) * 100 || 0;

        const dayLosers = totalCount - dayGainers;
        const tdcBreadthEl = document.getElementById("tdc-breadth");
        tdcBreadthEl.innerHTML = `${dayBreadthPct.toFixed(2)} ${dayBreadthPct >= 50 ? "▲" : "▼"}<span class="tooltip"><span class="g">${dayGainers} ↑</span> <span class="r">${dayLosers} ↓</span></span>`;
        tdcBreadthEl.className =
          "pct-badge " + (dayBreadthPct >= 50 ? "pct-g" : "pct-r");

        const totalLosers = totalCount - totalGainers;
        const pnlBreadthEl = document.getElementById("pnl-breadth");
        pnlBreadthEl.innerHTML = `${totalBreadthPct.toFixed(2)} ${totalBreadthPct >= 50 ? "▲" : "▼"}<span class="tooltip"><span class="g">${totalGainers} ↑</span> <span class="r">${totalLosers} ↓</span></span>`;
        pnlBreadthEl.className =
          "pct-badge " + (totalBreadthPct >= 50 ? "pct-g" : "pct-r");
      }

      // ── Render: Tag filter row ────────────────────────
      function tagColorStyle(t) {
        const syms = Object.keys(stockTags).filter((s) =>
          (stockTags[s] || []).includes(t)
        );
        const stocks = H.filter((h) => syms.includes(h.tradingsymbol));
        if (!stocks.length) return { bg: "#161616" };
        const gainers = stocks.filter((h) => h.day_change >= 0).length;
        const gainPct = (gainers / stocks.length) * 100;
        return {
          bg:
            t === "x-cash"
              ? "plum"
              : `linear-gradient(to right, lightgreen 0%, lightgreen ${gainPct}%, lightcoral ${gainPct}%, lightcoral 100%)`
        };
      }

      function renderTagFilterRow() {
        const sorted = [...globalTags].sort((a, b) => a.localeCompare(b));
        let html = "";

        sorted.forEach((t) => {
          const count = Object.keys(stockTags).filter(
            (sym) =>
              (stockTags[sym] || []).includes(t) &&
              H.some((h) => h.tradingsymbol === sym)
          ).length;
          const active = activeTagFilters.has(t);
          const { bg: nameBg } = tagColorStyle(t);
          const borderColor = active ? "#2d5fc4" : "#4a4a4a";
          const countBg = active ? "#2d5fc4" : "#161616";
          const nameColor = editModeOn
            ? "#fff"
            : active
              ? "#fff"
              : count === 0
                ? "#fff"
                : holdingsLoaded
                  ? "#111111"
                  : "#fff";
          const color = active ? "#fff" : "#d4d4d4";
          const dividerColor = active ? "rgba(255,255,255,.3)" : "#2a2a2a";
          const xColor = active ? "#fff" : "#d4d4d4";
          const finalNameBg = active
            ? "#2d5fc4"
            : editModeOn
              ? "#161616"
              : nameBg;

          html += `<span class="tag-pill-wrap" style="border:1px solid ${borderColor};background:${countBg}">`;
          html += `<span class="tag-pill-name" style="color:${nameColor};cursor:${editModeOn ? "default" : "pointer"};background:${finalNameBg}" ${editModeOn ? "" : `onclick="toggleTagFilter('${t}')"`}>${t}</span>`;

          if (!editModeOn) {
            html += `<span class="tag-pill-count" data-count style="color:${color};border-left:1px solid ${dividerColor}" onclick="toggleTagFilter('${t}')">${count}</span>`;
          }

          if (editModeOn) {
            const renameColor = active ? xColor : "#5b8def";
            const renameBgEffect = active
              ? "transparent"
              : "rgba(91,141,239,.15)";
            html += `<span class="tag-pill-action" onclick="renameTag('${t}')" title="Rename tag" style="border-left:1px solid ${dividerColor};color:${renameColor};background:${renameBgEffect}"><span class="icon-sm">✎</span></span>`;
            const deleteColor = active ? xColor : "#f44336";
            const deleteBgEffect = active
              ? "transparent"
              : "rgba(244,67,54,.15)";
            html += `<span class="tag-pill-action" onclick="deleteTag('${t}')" style="border-left:1px solid ${dividerColor};color:${deleteColor};background:${deleteBgEffect}"><span class="icon-x">×</span></span>`;
          }

          html += `</span>`;
        });

        document.getElementById("tag-filters").innerHTML = html;

        const actionsHtml =
          `<span class="tag-actions-wrap">` +
          `<span class="chip add-tag-chip grouped-chip ${addTagModalOpen ? "active" : ""}" onclick="openAddTagModal()"><span class="icon-plus">+</span><span>Add</span></span>` +
          `<span class="chip edit-toggle-chip grouped-chip ${editModeOn ? "active" : ""}" onclick="toggleEditMode()"><span class="icon-edit">✎</span><span>Edit</span></span>` +
          `</span>`;
        document.getElementById("tag-actions").innerHTML = actionsHtml;
      }

      function resetFilters() {
        activeTagFilters.clear();
        autoTagFilters.clear();
        const searchEl = document.getElementById("search");
        if (searchEl) searchEl.value = "";
        renderTagFilterRow();
        renderTable();
        focusSearch();
      }

      function toggleEditMode() {
        editModeOn = !editModeOn;
        renderTagFilterRow();
      }

      function toggleTagFilter(t) {
        activeTagFilters.has(t)
          ? activeTagFilters.delete(t)
          : activeTagFilters.add(t);
        autoTagFilters.delete(t);
        renderTagFilterRow();
        renderTable();
        focusSearch();
      }

      // ── Render: Table ─────────────────────────────────
      const COLS = [
        {
          k: "tradingsymbol",
          l: "Symbol",
          str: true,
          fmt: (v) => `<span class="sym">${v}</span>`
        },
        {
          k: "quantity",
          l: "Qty.",
          num: true,
          fmt: (v) => `<span style="color:#5b8def">${v}</span>`
        },
        { k: "_inv", l: "Invested", num: true, fmt: (v) => fi(v) },
        { k: "average_price", l: "Avg. cost", num: true, fmt: (v) => fc(v) },
        {
          k: "last_price",
          l: "LTP",
          num: true,
          fmt: (v, r) =>
            `<span class="${r.day_change >= 0 ? "pos" : "neg"}">${fc(v)}</span>`
        },
        {
          k: "_wt",
          l: "Wt.",
          num: true,
          fmt: (v, r) => {
            if (weightMode === "invested") {
              return `<span style="color:lightskyblue">${r._wtInvested.toFixed(2)}%</span>`;
            }
            if (weightMode === "current") {
              return `<span style="color:khaki">${r._wtCurrent.toFixed(2)}%</span>`;
            }
            if (weightMode === "total") {
              const val = r._wtTotal;
              return `<span style="color:${val >= 0 ? "lightgreen" : "lightcoral"}">${val >= 0 ? "+" : ""}${val.toFixed(2)}%</span>`;
            }
            const val = r._wtDay;
            return `<span style="color:${val >= 0 ? "lightgreen" : "lightcoral"}">${val >= 0 ? "+" : ""}${val.toFixed(2)}%</span>`;
          }
        },
        {
          k: "pnl",
          l: "P&amp;L",
          num: true,
          fmt: (v) =>
            `<span class="${v >= 0 ? "pp" : "pn"}">${v >= 0 ? "+" : "-"}${fi(v)}</span>`
        },
        {
          k: "_ret",
          l: "Net chg.",
          num: true,
          fmt: (v) => {
            return `<span style="color:${v >= 0 ? "lightgreen" : "lightcoral"}">${Math.abs(v).toFixed(2)}%</span>`;
          }
        },
        {
          k: "day_change_percentage",
          l: "Day chg.",
          num: true,
          fmt: (v) => {
            return `<span class="${v >= 0 ? "pos" : "neg"}">${v >= 0 ? "+" : ""}${v.toFixed(2)}%</span>`;
          }
        }
      ];

      function cycleSort(k) {
        if (k === "_ret") {
          retSortMode = sCol === "_ret" && retSortMode === 1 ? 2 : 1;
          sCol = "_ret";
          sDir = 0;
          renderTable();
          return;
        }
        retSortMode = 0;
        if (sCol !== k) {
          sCol = k;
          sDir = -1;
        } else {
          sDir = sDir === -1 ? 1 : -1;
        }
        renderTable();
      }

      function sortVal(row, key) {
        if (key === "_ret") return Math.abs(row[key]);
        if (key === "_wt") {
          if (weightMode === "invested") return row._wtInvested;
          if (weightMode === "current") return row._wtCurrent;
          if (weightMode === "total") return row._wtTotal;
          return row._wtDay;
        }
        return row[key];
      }

      // Matches a tag name against a query, checking the whole name as well
      // as each "-"-separated segment (e.g. "x-down" matches query "d")
      function tagMatchesQuery(tagName, query) {
        return tagName
          .toLowerCase()
          .replace(/\s+/g, "")
          .split("-")
          .some((seg) => seg.startsWith(query));
      }

      function renderTable() {
        const rawQ = (document.getElementById("search")?.value || "")
          .toLowerCase()
          .trim();
        const queries = rawQ
          .split(",")
          .map((s) => s.replace(/\s+/g, ""))
          .filter(Boolean);

        // Auto-activate tag filters matching search query
        const matchedTags = queries.length
          ? new Set(
              globalTags.filter((t) =>
                queries.some((q) => tagMatchesQuery(t, q))
              )
            )
          : new Set();
        let filtersChanged = false;

        autoTagFilters.forEach((t) => {
          if (!matchedTags.has(t)) {
            activeTagFilters.delete(t);
            autoTagFilters.delete(t);
            filtersChanged = true;
          }
        });
        matchedTags.forEach((t) => {
          if (!activeTagFilters.has(t)) {
            activeTagFilters.add(t);
            autoTagFilters.add(t);
            filtersChanged = true;
          }
        });

        if (filtersChanged) renderTagFilterRow();

        let data;
        if (activeTagFilters.size) {
          // Any tag active (manual or search-matched) → union of stocks
          // carrying any of those tags. Symbol text is ignored entirely.
          data = H.filter((h) => {
            const t = stockTags[h.tradingsymbol] || [];
            return [...activeTagFilters].some((f) => t.includes(f));
          });
        } else if (queries.length) {
          // No tags active → filter purely by symbol match
          data = H.filter((h) => {
            const symLower = h.tradingsymbol.toLowerCase().replace(/\s+/g, "");
            return queries.some(
              (q) => symLower.startsWith(q) || symLower.includes(q)
            );
          });
        } else {
          data = H;
        }

        if (sCol === "_ret") {
          const reds = data
            .filter((h) => h._ret < 0)
            .sort((a, b) => b._ret - a._ret);
          const greens = data
            .filter((h) => h._ret >= 0)
            .sort((a, b) => b._ret - a._ret);
          const redFirst = [...reds, ...greens];
          data = retSortMode === 1 ? redFirst : redFirst.reverse();
        } else if (sCol && sDir !== 0) {
          const col = COLS.find((c) => c.k === sCol);
          data = [...data].sort(
            (a, b) =>
              sDir *
              (col?.str
                ? a[sCol] < b[sCol]
                  ? -1
                  : a[sCol] > b[sCol]
                    ? 1
                    : 0
                : sortVal(a, sCol) - sortVal(b, sCol))
          );
        }

        const icon = (k) => {
          if (k === "_ret") {
            if (retSortMode === 1) return '<span class="si si-red">▲</span>';
            if (retSortMode === 2) return '<span class="si si-green">▲</span>';
            return '<span class="si"></span>';
          }
          return sCol !== k
            ? '<span class="si"></span>'
            : sDir === 1
              ? '<span class="si">▲</span>'
              : '<span class="si">▼</span>';
        };
        const cls = (k) =>
          k === "_ret" ? "" : sCol === k ? (sDir === 1 ? "asc" : "desc") : "";

        const countEl = document.getElementById("search-count");
        if (countEl) countEl.textContent = `${data.length}/${H.length}`;

        COLS.forEach((c) => {
          const th = document.querySelector(
            `#th th[onclick="cycleSort('${c.k}')"]`
          );
          if (!th) return;
          th.className = cls(c.k);
          const si = th.querySelector(".si");
          if (!si) return;
          const tmp = document.createElement("div");
          tmp.innerHTML = icon(c.k);
          const newSi = tmp.firstElementChild;
          si.className = newSi.className;
          si.textContent = newSi.textContent;
        });

        document.getElementById("tb").innerHTML = data
          .map(
            (h) =>
              `<tr onclick="openAssignModal('${h.tradingsymbol}')">` +
              COLS.map((c) => `<td>${c.fmt(h[c.k], h)}</td>`).join("") +
              `</tr>`
          )
          .join("");
      }

      // ── Modal: Assign tags ────────────────────────────
      function openAssignModal(symbol) {
        editingSymbol = symbol;
        document.getElementById("assign-modal-title").textContent = symbol;
        renderAssignPills();
        document.getElementById("assign-modal").classList.add("open");
      }

      function renderAssignPills() {
        const container = document.getElementById("assign-tag-pills");
        const assigned = stockTags[editingSymbol] || [];
        const sorted = [...globalTags].sort((a, b) => a.localeCompare(b));
        if (!sorted.length) {
          container.innerHTML =
            '<span class="no-tags-msg">No tags available</span>';
          return;
        }

        const regularTags = sorted.filter((t) => !t.startsWith("x-"));
        const xTags = sorted.filter((t) => t.startsWith("x-"));

        const renderPill = (t) => {
          const isSelected = assigned.includes(t);
          if (t === "x-cash")
            return `<button class="tag-pill-toggle tag-cash" disabled>${t}</button>`;
          else
            return `<button class="tag-pill-toggle ${isSelected ? "selected" : ""}" onclick="toggleStockTag('${t}')">${t}</button>`;
        };

        let html = regularTags.map(renderPill).join("");
        if (xTags.length) {
          html += `<div class="tag-section-divider"></div>`;
          html += xTags.map(renderPill).join("");
        }
        container.innerHTML = html;
      }

      async function toggleStockTag(tag) {
        const assigned = stockTags[editingSymbol] || [];
        const isAssigned = assigned.includes(tag);
        const prev = [...assigned];

        // Optimistic update
        stockTags[editingSymbol] = isAssigned
          ? assigned.filter((t) => t !== tag)
          : [...assigned, tag];
        persistTagsCache();
        renderAssignPills();
        renderTable();

        try {
          const res = await fetch("/api/stock-tags", {
            method: isAssigned ? "DELETE" : "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ symbol: editingSymbol, tag })
          });
          if (!res.ok) throw new Error("Failed to update tag assignment");
        } catch (e) {
          stockTags[editingSymbol] = prev;
          persistTagsCache();
          renderAssignPills();
          renderTable();
          showToast(e.message);
        }
      }

      function closeAssignModal() {
        document.getElementById("assign-modal").classList.remove("open");
        editingSymbol = null;
        focusSearch();
      }

      document.getElementById("assign-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("assign-modal"))
          closeAssignModal();
      });

      // ── Modal: Add tag ────────────────────────────────
      function openAddTagModal() {
        addTagModalOpen = true;
        document.getElementById("new-tag-input").value = "";
        document.getElementById("addtag-modal").classList.add("open");
        renderTagFilterRow();
        setTimeout(() => document.getElementById("new-tag-input").focus(), 50);
      }

      async function createTag() {
        const inp = document.getElementById("new-tag-input");
        const val = inp.value.trim();
        if (!val || globalTags.includes(val)) {
          inp.value = "";
          return;
        }

        // Optimistic update
        globalTags.push(val);
        persistTagsCache();
        inp.value = "";
        closeAddTagModal();

        try {
          const res = await fetch("/api/tags", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: val })
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || "Failed to create tag");
          }
        } catch (e) {
          globalTags = globalTags.filter((t) => t !== val);
          persistTagsCache();
          showToast(e.message);
        }
      }

      function closeAddTagModal() {
        addTagModalOpen = false;
        document.getElementById("addtag-modal").classList.remove("open");
        renderTagFilterRow();
        focusSearch();
      }

      document.getElementById("addtag-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("addtag-modal"))
          closeAddTagModal();
      });

      // ── Modal: Rename tag ─────────────────────────────
      let renamingTag = null;

      function renameTag(tag) {
        renamingTag = tag;
        const inp = document.getElementById("rename-tag-input");
        inp.value = tag;
        document.getElementById("renametag-modal").classList.add("open");
        setTimeout(() => {
          inp.focus();
          inp.select();
        }, 50);
      }

      async function confirmRenameTag() {
        const inp = document.getElementById("rename-tag-input");
        const newName = inp.value.trim();
        if (!newName || newName === renamingTag) {
          closeRenameTagModal();
          return;
        }
        if (globalTags.includes(newName)) {
          alert("A tag with this name already exists.");
          return;
        }

        const oldName = renamingTag;
        const prevTags = [...globalTags];
        const prevStock = JSON.parse(JSON.stringify(stockTags));
        const prevFilters = new Set(activeTagFilters);

        // Optimistic update
        globalTags = globalTags.map((t) => (t === oldName ? newName : t));
        Object.keys(stockTags).forEach((sym) => {
          stockTags[sym] = stockTags[sym].map((t) =>
            t === oldName ? newName : t
          );
        });
        if (activeTagFilters.has(oldName)) {
          activeTagFilters.delete(oldName);
          activeTagFilters.add(newName);
        }
        persistTagsCache();
        renderTable();
        closeRenameTagModal();

        try {
          const res = await fetch("/api/tags/" + encodeURIComponent(oldName), {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ newName })
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || "Failed to rename tag");
          }
        } catch (e) {
          globalTags = prevTags;
          stockTags = prevStock;
          activeTagFilters = prevFilters;
          persistTagsCache();
          renderTable();
          showToast(e.message);
        }
      }

      function closeRenameTagModal() {
        document.getElementById("renametag-modal").classList.remove("open");
        renamingTag = null;
        focusSearch();
      }

      document
        .getElementById("renametag-modal")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("renametag-modal"))
            closeRenameTagModal();
        });

      // ── Delete tag ────────────────────────────────────
      let pendingDeleteTag = null;

      function deleteTag(tag) {
        pendingDeleteTag = tag;
        document.getElementById("delete-confirm-text").textContent =
          `Delete tag "${tag}"?`;
        document.getElementById("delete-confirm-modal").classList.add("open");
        setTimeout(
          () => document.getElementById("delete-confirm-btn").focus(),
          50
        );
      }

      function closeDeleteConfirmModal() {
        document
          .getElementById("delete-confirm-modal")
          .classList.remove("open");
        pendingDeleteTag = null;
        focusSearch();
      }

      document
        .getElementById("delete-confirm-modal")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("delete-confirm-modal"))
            closeDeleteConfirmModal();
        });

      async function confirmDeleteTag() {
        const tag = pendingDeleteTag;
        closeDeleteConfirmModal();
        if (!tag) return;

        const prevTags = [...globalTags];
        const prevStock = JSON.parse(JSON.stringify(stockTags));
        const wasActive = activeTagFilters.has(tag);

        // Optimistic update
        globalTags = globalTags.filter((t) => t !== tag);
        Object.keys(stockTags).forEach((sym) => {
          stockTags[sym] = stockTags[sym].filter((t) => t !== tag);
        });
        activeTagFilters.delete(tag);
        persistTagsCache();
        if (editingSymbol) renderAssignPills();
        renderTable();

        try {
          const res = await fetch("/api/tags/" + encodeURIComponent(tag), {
            method: "DELETE"
          });
          if (!res.ok) throw new Error("Failed to delete tag");
        } catch (e) {
          globalTags = prevTags;
          stockTags = prevStock;
          if (wasActive) activeTagFilters.add(tag);
          persistTagsCache();
          if (editingSymbol) renderAssignPills();
          renderTable();
          showToast(e.message);
        }
      }

      // ── Focus management ──────────────────────────────
      function isAnyModalOpen() {
        return [
          "assign-modal",
          "addtag-modal",
          "renametag-modal",
          "delete-confirm-modal"
        ].some((id) => document.getElementById(id).classList.contains("open"));
      }

      function focusSearch() {
        if (isAnyModalOpen()) return;
        if (window.getSelection()?.toString().length > 0) return;
        const el = document.getElementById("search");
        if (el && document.activeElement !== el) el.focus();
      }

      document.addEventListener("dblclick", (e) => {
        if (isAnyModalOpen()) return;
        resetFilters();
      });

      document.addEventListener("click", (e) => {
        const inAnyModal = e.target.closest(".modal-overlay");
        if (!inAnyModal) focusSearch();

        if (editModeOn) {
          const isEditAction = e.target.closest(
            '[onclick^="renameTag"], [onclick^="deleteTag"], [onclick^="toggleEditMode"]'
          );
          const isTagPill = e.target.closest(
            "#tag-filters span, #tag-actions span"
          );
          if (!isEditAction && !inAnyModal && !isTagPill) {
            editModeOn = false;
            renderTagFilterRow();
          }
        }
      });

      // ── Init ──────────────────────────────────────────
      setStatus(true); // show clock immediately before first fetch
      setWeightMode("day"); // default weight mode
      focusSearch();
      setInterval(fetchHoldings, 5000);
      if (loadTagsFromCache()) renderTagFilterRow();
      fetchHoldings();
      loadTagsFromServer();
    </script>
  </body>
</html>
