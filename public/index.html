<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zerodha Dashboard</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #111111;
        color: #d4d4d4;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        font-variant-numeric: tabular-nums;
      }

      /* ── Header ── */
      .header {
        background: #111111;
        border-bottom: 1px solid #4a4a4a;
        padding: 14px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
      }
      .logo h1 {
        font-size: 17px;
        font-weight: 600;
        color: #e8e8e8;
      }
      .header-search {
        flex: 1;
        max-width: 600px;
        margin: 0 16px;
      }
      .search-box {
        position: relative;
      }
      .search-box input {
        width: 100%;
        padding: 8px 50px 8px 34px;
        border: 1px solid #4a4a4a;
        border-radius: 8px;
        font-size: 13px;
        background: #161616;
        color: #d4d4d4;
        outline: none;
        font-family: inherit;
      }
      .search-box input::placeholder {
        color: #6a6a6a;
      }
      .search-box input:focus {
        border-color: #387ed1;
        box-shadow: 0 0 0 3px rgba(56, 126, 209, 0.15);
      }
      .search-box svg {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #6a6a6a;
      }
      .search-box .search-count {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #6a6a6a;
        font-size: 12px;
        pointer-events: none;
        white-space: nowrap;
      }
      .status-pill {
        font-size: 12px;
        color: #ffffff;
        background: #1a1a1a;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #4a4a4a;
        user-select: none;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
      }
      .dot-live {
        background: #4caf50;
        animation: pulse 2s infinite;
        position: relative;
        top: -0.35px;
      }
      .dot-err {
        background: #f44336;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ── Summary ── */
      .summary {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: #111111;
        border-bottom: 1px solid #4a4a4a;
      }
      .stat {
        padding: 18px 24px;
        border-right: 1px solid #4a4a4a;
      }
      .stat:last-child {
        border-right: none;
      }
      .stat .lbl {
        font-size: 12px;
        color: #8a8a8a;
        margin-bottom: 10px;
      }
      .stat .lbl-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
      }
      .stat .lbl-row .lbl {
        margin-bottom: 0;
      }
      .val {
        font-size: 26px;
        font-weight: 500;
        color: #e8e8e8;
        line-height: 1;
        display: flex;
        align-items: baseline;
      }
      .val .dec {
        font-size: 14px;
        font-weight: 400;
        color: #8a8a8a;
      }
      .val-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        margin-top: 2px;
      }
      .pct-badge {
        font-size: 12px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 4px;
        align-self: flex-end;
        position: relative;
      }
      .pct-badge .tooltip {
        position: absolute;
        bottom: 100%;
        margin-bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1a1a;
        border: 1px solid #4a4a4a;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.15s;
        pointer-events: none;
        z-index: 50;
      }
      .pct-badge .tooltip::before,
      .pct-badge .tooltip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-style: solid;
      }
      .pct-badge .tooltip::before {
        border-width: 6px;
        border-color: #4a4a4a transparent transparent transparent;
      }
      .pct-badge .tooltip::after {
        border-width: 5px;
        margin-top: -1px;
        border-color: #1a1a1a transparent transparent transparent;
      }
      .pct-badge:hover .tooltip {
        opacity: 1;
        visibility: visible;
      }
      .pct-g {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
      }
      .pct-r {
        background: rgba(244, 67, 54, 0.15);
        color: #f44336;
      }
      .g {
        color: #4caf50;
      }
      .r {
        color: #f44336;
      }

      /* ── Table ── */
      .table-container {
        margin: 16px 28px 20px;
      }
      .filter-row {
        display: flex;
        align-items: end;
        justify-content: end;
        gap: 6px;
        margin-bottom: 12px;
        min-height: 28px;
      }
      .filter-row-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        flex: 1;
      }
      .filter-row-actions {
        position: absolute;
      }
      .table-wrap {
        background: #111111;
        border-radius: 12px;
        border: 1px solid #4a4a4a;
        overflow: hidden;
      }
      .table-scroll {
        overflow-y: scroll;
        max-height: 400px;
        overflow-x: auto;
        scrollbar-gutter: stable;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead {
        position: sticky;
        top: 0;
        z-index: 10;
      }
      th {
        padding: 11px 14px;
        text-align: left;
        font-size: 11px;
        font-weight: 500;
        color: #8a8a8a;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
        background: #111111;
        border-bottom: 1px solid #4a4a4a;
      }
      th:hover {
        color: #c0c0c0;
      }
      th .si {
        display: inline-block;
        width: 14px;
        margin-left: 4px;
        font-size: 9px;
        opacity: 0.35;
        text-align: center;
      }
      th.asc .si,
      th.desc .si {
        opacity: 1;
        color: #5b8def;
      }
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #3a3a3a;
        white-space: nowrap;
        color: #d4d4d4;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: #2a2a2a;
      }
      tbody tr {
        cursor: pointer;
      }
      .sym {
        font-weight: 500;
        color: #e8e8e8;
      }
      .pos {
        color: #4caf50;
      }
      .neg {
        color: #f44336;
      }
      .pp {
        color: #4caf50;
        font-weight: 500;
      }
      .pn {
        color: #f44336;
        font-weight: 500;
      }

      /* ── Chips ── */
      .chip {
        font-size: 13px;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #4a4a4a;
        background: #161616;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .chip:hover {
        border-color: #5b8def;
        color: #5b8def;
      }
      .chip.active {
        background: #2d5fc4;
        border-color: #2d5fc4;
        color: #fff;
      }
      .chip.add-tag-chip {
        border-style: dashed;
        border-color: #5a5a5a;
      }
      .chip.add-tag-chip:hover {
        border-color: #5b8def;
        color: #5b8def;
      }
      .chip.edit-toggle-chip:hover {
        color: #5b8def;
      }
      .chip.edit-toggle-chip.active {
        background: #2d5fc4;
        color: #fff;
      }
      .grouped-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 6px 14px;
        cursor: pointer;
        user-select: none;
        font-size: 13px;
      }

      /* ── Modals ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #161616;
        border: 1px solid #4a4a4a;
        border-radius: 14px;
        padding: 8px 12px 12px;
        width: 400px;
        max-width: 95vw;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .modal-header h3 {
        font-size: 15px;
        font-weight: 600;
        color: #e8e8e8;
      }
      .modal-close {
        font-size: 26px;
        color: #6a6a6a;
        cursor: pointer;
        line-height: 1;
      }
      .modal-close:hover {
        color: #b0b0b0;
      }
      .tag-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag-pill-toggle {
        font-size: 12px;
        padding: 5px 13px;
        border-radius: 20px;
        border: 1.5px solid #4a4a4a;
        background: #1a1a1a;
        color: #b0b0b0;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
        font-family: inherit;
        font-weight: 500;
      }
      .tag-pill-toggle:hover {
        border-color: #5b8def;
        color: #5b8def;
      }
      .tag-pill-toggle.selected {
        background: #2d5fc4;
        border-color: #2d5fc4;
        color: #fff;
      }
      .add-tag-row {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }
      .add-tag-row input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #4a4a4a;
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        color: #d4d4d4;
        background: #1a1a1a;
      }
      .add-tag-row input::placeholder {
        color: #6a6a6a;
      }
      .add-tag-row input:focus {
        border-color: #2d5fc4;
        box-shadow: 0 0 0 3px rgba(45, 95, 196, 0.15);
      }
      .btn-add {
        padding: 8px 16px;
        background: #2d5fc4;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      .btn-add:hover {
        background: #244ea0;
      }

      /* ── Toast ── */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 200;
      }
      .toast {
        background: #1a1a1a;
        border: 1px solid #f44336;
        color: #f44336;
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        animation: toast 3s ease-in-out forwards;
        max-width: 320px;
      }
      @keyframes toast {
        0% {
          opacity: 0;
          transform: translateY(8px);
        }
        20% {
          opacity: 1;
          transform: translateY(0);
        }
        80% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(8px);
        }
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        height: 6px;
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #111111;
      }
      ::-webkit-scrollbar-thumb {
        background: #4a4a4a;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a3a3a;
      }

      /* ── Responsive ── */
      @media (max-width: 700px) {
        .summary {
          grid-template-columns: 1fr 1fr;
        }
        .table-container {
          margin: 12px;
        }
        .header {
          padding: 12px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="dashboard">
      <div class="header">
        <a
          class="logo"
          href="https://kite.zerodha.com/holdings/equity"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="favicon.ico" alt="Zerodha Logo" width="32" height="32" />
          <h1>Zerodha Dashboard</h1>
        </a>
        <div class="header-search">
          <div class="search-box">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input
              type="text"
              id="search"
              placeholder="Search by symbol or tag"
              oninput="renderTable()"
            />
            <span class="search-count" id="search-count"></span>
          </div>
        </div>
        <div class="status-pill" id="status-pill">
          <span class="status-dot dot-live" id="sdot"></span>Live&nbsp;<span
            style="
              font-size: 32px;
              line-height: 0;
              vertical-align: middle;
              position: relative;
              top: -0.5px;
            "
            >·</span
          >&nbsp;<span id="ts-text"></span>
        </div>
      </div>

      <div class="summary">
        <div class="stat">
          <div class="lbl">Total Investment</div>
          <div class="val-row"><div class="val" id="inv">—</div></div>
        </div>
        <div class="stat">
          <div class="lbl">Current Value</div>
          <div class="val-row"><div class="val" id="cur">—</div></div>
        </div>
        <div class="stat">
          <div class="lbl-row">
            <span class="lbl">Day's P&amp;L</span>
            <span class="pct-badge" id="tdc-breadth"></span>
          </div>
          <div class="val-row">
            <div class="val" id="tdc">—</div>
            <span class="pct-badge" id="tdc-pct"></span>
          </div>
        </div>
        <div class="stat">
          <div class="lbl-row">
            <span class="lbl">Total P&amp;L</span>
            <span class="pct-badge" id="pnl-breadth"></span>
          </div>
          <div class="val-row">
            <div class="val" id="pnl">—</div>
            <span class="pct-badge" id="pnl-pct"></span>
          </div>
        </div>
      </div>

      <div class="table-container">
        <div class="filter-row">
          <div class="filter-row-tags" id="tag-filters"></div>
          <div class="filter-row-actions" id="tag-actions"></div>
        </div>
        <div class="table-wrap">
          <div class="table-scroll">
            <table>
              <thead id="th"></thead>
              <tbody id="tb"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Assign tags modal -->
    <div class="modal-overlay" id="assign-modal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="assign-modal-title">Assign Tags</h3>
          <span class="modal-close" onclick="closeAssignModal()">×</span>
        </div>
        <div class="tag-pills" id="assign-tag-pills"></div>
      </div>
    </div>

    <!-- Add tag modal -->
    <div class="modal-overlay" id="addtag-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Add New Tag</h3>
          <span class="modal-close" onclick="closeAddTagModal()">×</span>
        </div>
        <div class="add-tag-row">
          <input
            type="text"
            id="new-tag-input"
            placeholder="Tag name"
            onkeydown="if (event.key === 'Enter') createTag();"
          />
          <button class="btn-add" onclick="createTag()">Add</button>
        </div>
      </div>
    </div>

    <!-- Rename tag modal -->
    <div class="modal-overlay" id="renametag-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Rename Tag</h3>
          <span class="modal-close" onclick="closeRenameTagModal()">×</span>
        </div>
        <div class="add-tag-row">
          <input
            type="text"
            id="rename-tag-input"
            placeholder="New tag name…"
            onkeydown="if (event.key === 'Enter') confirmRenameTag();"
          />
          <button class="btn-add" onclick="confirmRenameTag()">Rename</button>
        </div>
      </div>
    </div>

    <!-- Delete tag confirmation modal -->
    <div class="modal-overlay" id="delete-confirm-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Delete Tag</h3>
          <span class="modal-close" onclick="closeDeleteConfirmModal()">×</span>
        </div>
        <p
          id="delete-confirm-text"
          style="font-size: 13px; color: #b0b0b0; margin-bottom: 16px"
        ></p>
        <div class="add-tag-row">
          <button
            class="btn-add"
            id="delete-confirm-btn"
            style="background: #c4302d; flex: 1"
            onclick="confirmDeleteTag()"
          >
            Delete
          </button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
      // ── State ─────────────────────────────────────────
      let H = [];
      let holdingsLoaded = false;
      let sCol = "day_change_percentage",
        sDir = -1;
      let cleanupDone = false;
      let activeTagFilters = new Set();
      let autoTagFilters = new Set();
      let editingSymbol = null;
      let editModeOn = false;
      let addTagModalOpen = false;
      let globalTags = [];
      let stockTags = {};

      // ── localStorage cache ────────────────────────────
      // "tags"       → string[]              (mirrors `tags` table)
      // "stock_tags" → { symbol: string[] }  (mirrors `stock_tags` table)
      function loadTagsFromCache() {
        try {
          const rawTags = localStorage.getItem("tags");
          const rawStockTags = localStorage.getItem("stock_tags");
          if (!rawTags && !rawStockTags) return false;
          globalTags = rawTags ? JSON.parse(rawTags) : [];
          stockTags = rawStockTags ? JSON.parse(rawStockTags) : {};
          return true;
        } catch (e) {
          return false;
        }
      }
      function persistTagsCache() {
        localStorage.setItem("tags", JSON.stringify(globalTags));
        localStorage.setItem("stock_tags", JSON.stringify(stockTags));
      }

      // ── Toast ─────────────────────────────────────────
      function showToast(message) {
        const el = document.createElement("div");
        el.className = "toast";
        el.textContent = message;
        document.getElementById("toast-container").appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }

      // ── Formatting ────────────────────────────────────
      function fmtVal(n) {
        const [int, dec] = Math.abs(n).toFixed(2).split(".");
        return `<span>${Number(int).toLocaleString("en-IN")}</span><span class="dec">.${dec}</span>`;
      }
      const fc = (n) =>
        Math.abs(n).toLocaleString("en-IN", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      const fi = (n) => Math.round(Math.abs(n)).toLocaleString("en-IN");

      // ── Status / clock ────────────────────────────────
      function setStatus(ok) {
        const d = new Date();
        const h = d.getHours() % 12 || 12;
        const m = String(d.getMinutes()).padStart(2, "0");
        const s = String(d.getSeconds()).padStart(2, "0");
        const ap = d.getHours() >= 12 ? "PM" : "AM";
        const ts = `${String(h).padStart(2, "0")}:${m}:${s} ${ap}`;
        const pill = document.getElementById("status-pill");
        if (pill) {
          pill.innerHTML = `<span class="status-dot ${ok ? "dot-live" : "dot-err"}" id="sdot"></span>${ok ? "Live" : "Offline"}&nbsp;<span style="font-size:32px;line-height:0;vertical-align:middle;position:relative;top:-0.5px">·</span>&nbsp;<span id="ts-text">${ts}</span>`;
        }
      }

      // ── API: Holdings ─────────────────────────────────
      async function fetchHoldings() {
        try {
          const res = await fetch("/portfolio/holdings");
          const json = await res.json();
          const isApiFailure = json.status === "error";
          if (json.status === "Login-Required") {
            setStatus(false);
            window.location.href = "/login";
            return;
          }
          const raw = json.data || [];
          H = raw.map((h) => ({
            ...h,
            _inv: h.quantity * h.average_price,
            _cur: h.quantity * h.last_price,
            _ret: ((h.last_price - h.average_price) / h.average_price) * 100
          }));
          holdingsLoaded = isApiFailure ? false : true;
          setStatus(!isApiFailure);
          renderSummary();
          renderTagFilterRow();
          renderTable();
          if (!cleanupDone) {
            cleanupDone = true;
            runCleanup();
          }
        } catch (e) {
          setStatus(false);
        }
      }

      // ── API: Tags (GET) ───────────────────────────────
      async function loadTagsFromServer() {
        try {
          const res = await fetch("/api/tags");
          const data = await res.json();
          if (data.status !== "error") {
            globalTags = (data.tags || []).map((t) => t.name);
            stockTags = data.stockTags || {};
            persistTagsCache();
          }
        } catch (e) {}
      }

      // ── API: Cleanup ──────────────────────────────────
      async function runCleanup() {
        try {
          const symbols = H.map((h) => h.tradingsymbol);
          if (!symbols.length) return;
          await fetch("/api/cleanup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ symbols })
          });
        } catch (e) {}
      }

      // ── Render: Summary ───────────────────────────────
      function renderSummary() {
        let ti = 0,
          tc = 0,
          tdc = 0,
          tp = 0;
        H.forEach((h) => {
          ti += h._inv;
          tc += h._cur;
          tdc += h.day_change * h.quantity;
          tp += h.pnl;
        });
        const pp = (tp / ti) * 100 || 0;
        const dcPct = (tdc / (tc - tdc)) * 100 || 0;

        document.getElementById("inv").innerHTML = fmtVal(ti);
        document.getElementById("cur").innerHTML = fmtVal(tc);

        const tdcEl = document.getElementById("tdc");
        tdcEl.innerHTML = (tdc < 0 ? "-" : "") + fmtVal(tdc);
        tdcEl.className = "val " + (tdc >= 0 ? "g" : "r");
        const tdcB = document.getElementById("tdc-pct");
        tdcB.textContent = (dcPct >= 0 ? "+" : "") + dcPct.toFixed(2) + "%";
        tdcB.className = "pct-badge " + (tdc >= 0 ? "pct-g" : "pct-r");

        const pnlEl = document.getElementById("pnl");
        pnlEl.innerHTML = (tp < 0 ? "-" : "") + fmtVal(tp);
        pnlEl.className = "val " + (tp >= 0 ? "g" : "r");
        const pnlB = document.getElementById("pnl-pct");
        pnlB.textContent = (pp >= 0 ? "+" : "") + pp.toFixed(2) + "%";
        pnlB.className = "pct-badge " + (tp >= 0 ? "pct-g" : "pct-r");

        // ── Market breadth (with hover tooltip showing raw up/down counts) ──
        const totalCount = H.length || 0;
        const dayGainers = H.filter((h) => h.day_change >= 0).length;
        const totalGainers = H.filter((h) => h.pnl >= 0).length;
        const dayBreadthPct = (dayGainers / totalCount) * 100 || 0;
        const totalBreadthPct = (totalGainers / totalCount) * 100 || 0;

        const dayLosers = totalCount - dayGainers;
        const tdcBreadthEl = document.getElementById("tdc-breadth");
        tdcBreadthEl.innerHTML = `${dayBreadthPct.toFixed(2)} ${dayBreadthPct >= 50 ? "▲" : "▼"}<span class="tooltip"><span class="g">${dayGainers} ↑</span> <span class="r">${dayLosers} ↓</span></span>`;
        tdcBreadthEl.className =
          "pct-badge " + (dayBreadthPct >= 50 ? "pct-g" : "pct-r");

        const totalLosers = totalCount - totalGainers;
        const pnlBreadthEl = document.getElementById("pnl-breadth");
        pnlBreadthEl.innerHTML = `${totalBreadthPct.toFixed(2)} ${totalBreadthPct >= 50 ? "▲" : "▼"}<span class="tooltip"><span class="g">${totalGainers} ↑</span> <span class="r">${totalLosers} ↓</span></span>`;
        pnlBreadthEl.className =
          "pct-badge " + (totalBreadthPct >= 50 ? "pct-g" : "pct-r");
      }

      // ── Render: Tag filter row ────────────────────────
      function tagColorStyle(t) {
        const syms = Object.keys(stockTags).filter((s) =>
          (stockTags[s] || []).includes(t)
        );
        const stocks = H.filter((h) => syms.includes(h.tradingsymbol));
        if (!stocks.length) return { bg: "#161616" };
        const gainers = stocks.filter((h) => h.day_change >= 0).length;
        const gainPct = (gainers / stocks.length) * 100;
        return {
          bg:
            t === "x-cash"
              ? "lightskyblue"
              : `linear-gradient(to right, lightgreen 0%, lightgreen ${gainPct}%, lightcoral ${gainPct}%, lightcoral 100%)`
        };
      }

      function renderTagFilterRow() {
        const sorted = [...globalTags].sort((a, b) => a.localeCompare(b));
        let html = "";

        sorted.forEach((t) => {
          const count = Object.values(stockTags).filter((arr) =>
            arr.includes(t)
          ).length;
          const active = activeTagFilters.has(t);
          const { bg: nameBg } = tagColorStyle(t);
          const borderColor = active ? "#2d5fc4" : "#4a4a4a";
          const countBg = active ? "#2d5fc4" : "#161616";
          const nameColor = editModeOn
            ? "#fff"
            : active
              ? "#fff"
              : count === 0
                ? "#fff"
                : holdingsLoaded
                  ? "#111111"
                  : "#fff";
          const color = active ? "#fff" : "#d4d4d4";
          const dividerColor = active ? "rgba(255,255,255,.3)" : "#2a2a2a";
          const xColor = active ? "#fff" : "#d4d4d4";
          const finalNameBg = active
            ? "#2d5fc4"
            : editModeOn
              ? "#161616"
              : nameBg;

          html += `<span style="display:inline-flex;align-items:stretch;border-radius:20px;border:1px solid ${borderColor};overflow:hidden;background:${countBg}">`;
          html += `<span style="padding:5px 12px;font-size:13px;color:${nameColor};white-space:nowrap;cursor:${editModeOn ? "default" : "pointer"};display:flex;align-items:center;background:${finalNameBg}" ${editModeOn ? "" : `onclick="toggleTagFilter('${t}')"`}>${t}</span>`;

          if (!editModeOn) {
            html += `<span data-count style="padding:5px 12px;font-size:13px;color:${color};cursor:pointer;white-space:nowrap;border-left:1px solid ${dividerColor}" onclick="toggleTagFilter('${t}')">${count}</span>`;
          }

          if (editModeOn) {
            const renameColor = active ? xColor : "#5b8def";
            const renameBgEffect = active
              ? "transparent"
              : "rgba(91,141,239,.15)";
            html += `<span onclick="renameTag('${t}')" title="Rename tag" style="display:flex;align-items:center;justify-content:center;padding:0 10px;border-left:1px solid ${dividerColor};color:${renameColor};cursor:pointer;background:${renameBgEffect}"><span style="font-size:13px;line-height:0">✎</span></span>`;
            const deleteColor = active ? xColor : "#f44336";
            const deleteBgEffect = active
              ? "transparent"
              : "rgba(244,67,54,.15)";
            html += `<span onclick="deleteTag('${t}')" style="display:flex;align-items:center;justify-content:center;padding:0 10px;border-left:1px solid ${dividerColor};color:${deleteColor};cursor:pointer;background:${deleteBgEffect}"><span style="font-size:19px;line-height:0;position:relative;top:-1px">×</span></span>`;
          }

          html += `</span>`;
        });

        document.getElementById("tag-filters").innerHTML = html;

        const actionsHtml =
          `<span style="display:inline-flex;align-items:stretch;border-radius:20px;overflow:hidden;border:1px solid #4a4a4a">` +
          `<span class="chip add-tag-chip grouped-chip ${addTagModalOpen ? "active" : ""}" style="border:none;border-radius:0" onclick="openAddTagModal()"><span style="font-size:22px;line-height:0;position:relative;top:-2px">+</span><span>Add</span></span>` +
          `<span class="chip edit-toggle-chip grouped-chip ${editModeOn ? "active" : ""}" style="border:none;border-left:1px solid #4a4a4a;border-radius:0" onclick="toggleEditMode()"><span style="font-size:13px;line-height:0;position:relative;top:-1px">✎</span><span>Edit</span></span>` +
          `</span>`;
        document.getElementById("tag-actions").innerHTML = actionsHtml;
      }

      function resetFilters() {
        activeTagFilters.clear();
        autoTagFilters.clear();
        const searchEl = document.getElementById("search");
        if (searchEl) searchEl.value = "";
        renderTagFilterRow();
        renderTable();
        focusSearch();
      }

      function toggleEditMode() {
        editModeOn = !editModeOn;
        renderTagFilterRow();
      }

      function toggleTagFilter(t) {
        activeTagFilters.has(t)
          ? activeTagFilters.delete(t)
          : activeTagFilters.add(t);
        autoTagFilters.delete(t);
        renderTagFilterRow();
        renderTable();
        focusSearch();
      }

      // ── Render: Table ─────────────────────────────────
      const COLS = [
        {
          k: "tradingsymbol",
          l: "Symbol",
          str: true,
          fmt: (v) => `<span class="sym">${v}</span>`
        },
        {
          k: "quantity",
          l: "Qty.",
          num: true,
          fmt: (v) => `<span style="color:#5b8def">${v}</span>`
        },
        { k: "_inv", l: "Invested", num: true, fmt: (v) => fi(v) },
        {
          k: "pnl",
          l: "P&amp;L",
          num: true,
          fmt: (v) =>
            `<span class="${v >= 0 ? "pp" : "pn"}">${v >= 0 ? "+" : "-"}${fi(v)}</span>`
        },
        { k: "average_price", l: "Avg. cost", num: true, fmt: (v) => fc(v) },
        {
          k: "last_price",
          l: "LTP",
          num: true,
          fmt: (v, r) =>
            `<span class="${r.day_change >= 0 ? "pos" : "neg"}">${fc(v)}</span>`
        },
        {
          k: "_ret",
          l: "Net chg.",
          num: true,
          fmt: (v) =>
            `<span style="color:${v >= 0 ? "lightgreen" : "lightcoral"}">${Math.abs(v).toFixed(2)}%</span>`
        },
        {
          k: "day_change_percentage",
          l: "Day chg.",
          num: true,
          fmt: (v) =>
            `<span class="${v >= 0 ? "pos" : "neg"}">${v >= 0 ? "+" : ""}${v.toFixed(2)}%</span>`
        }
      ];

      function cycleSort(k) {
        if (sCol !== k) {
          sCol = k;
          sDir = -1;
        } else if (sDir === -1) {
          sDir = 1;
        } else {
          sCol = null;
          sDir = 0;
        }
        renderTable();
      }

      function sortVal(row, key) {
        return key === "_ret" ? Math.abs(row[key]) : row[key];
      }

      // Matches a tag name against a query, checking the whole name as well
      // as each "-"-separated segment (e.g. "x-down" matches query "d")
      function tagMatchesQuery(tagName, query) {
        return tagName
          .toLowerCase()
          .replace(/\s+/g, "")
          .split("-")
          .some((seg) => seg.startsWith(query));
      }

      function renderTable() {
        const rawQ = (document.getElementById("search")?.value || "")
          .toLowerCase()
          .trim();
        const queries = rawQ
          .split(",")
          .map((s) => s.replace(/\s+/g, ""))
          .filter(Boolean);

        // Auto-activate tag filters matching search query
        const matchedTags = queries.length
          ? new Set(
              globalTags.filter((t) =>
                queries.some((q) => tagMatchesQuery(t, q))
              )
            )
          : new Set();
        let filtersChanged = false;

        autoTagFilters.forEach((t) => {
          if (!matchedTags.has(t)) {
            activeTagFilters.delete(t);
            autoTagFilters.delete(t);
            filtersChanged = true;
          }
        });
        matchedTags.forEach((t) => {
          if (!activeTagFilters.has(t)) {
            activeTagFilters.add(t);
            autoTagFilters.add(t);
            filtersChanged = true;
          } else if (!autoTagFilters.has(t)) {
            autoTagFilters.add(t);
          }
        });

        if (filtersChanged) renderTagFilterRow();

        let data = H.filter((h) => {
          if (queries.length) {
            const symLower = h.tradingsymbol.toLowerCase().replace(/\s+/g, "");
            const tags = stockTags[h.tradingsymbol] || [];
            const symMatch = queries.some(
              (q) => symLower.startsWith(q) || symLower.includes(q)
            );
            const tagMatch = tags.some((t) =>
              queries.some((q) => tagMatchesQuery(t, q))
            );
            if (!symMatch && !tagMatch) return false;
          }
          if (activeTagFilters.size) {
            const t = stockTags[h.tradingsymbol] || [];
            if (![...activeTagFilters].some((f) => t.includes(f))) return false;
          }
          return true;
        });

        if (sCol && sDir !== 0) {
          const col = COLS.find((c) => c.k === sCol);
          data = [...data].sort(
            (a, b) =>
              sDir *
              (col?.str
                ? a[sCol] < b[sCol]
                  ? -1
                  : a[sCol] > b[sCol]
                    ? 1
                    : 0
                : sortVal(a, sCol) - sortVal(b, sCol))
          );
        }

        const icon = (k) =>
          sCol !== k
            ? '<span class="si"></span>'
            : sDir === 1
              ? '<span class="si">▲</span>'
              : '<span class="si">▼</span>';
        const cls = (k) => (sCol === k ? (sDir === 1 ? "asc" : "desc") : "");

        const countEl = document.getElementById("search-count");
        if (countEl) countEl.textContent = `${data.length}/${H.length}`;

        document.getElementById("th").innerHTML =
          "<tr>" +
          COLS.map(
            (c) =>
              `<th class="${cls(c.k)}" onclick="cycleSort('${c.k}')">${c.l}${icon(c.k)}</th>`
          ).join("") +
          "</tr>";

        document.getElementById("tb").innerHTML = data
          .map(
            (h) =>
              `<tr onclick="openAssignModal('${h.tradingsymbol}')">` +
              COLS.map((c) => `<td>${c.fmt(h[c.k], h)}</td>`).join("") +
              `</tr>`
          )
          .join("");
      }

      // ── Modal: Assign tags ────────────────────────────
      function openAssignModal(symbol) {
        editingSymbol = symbol;
        document.getElementById("assign-modal-title").textContent = symbol;
        renderAssignPills();
        document.getElementById("assign-modal").classList.add("open");
      }

      function renderAssignPills() {
        const container = document.getElementById("assign-tag-pills");
        const assigned = stockTags[editingSymbol] || [];
        const sorted = [...globalTags].sort((a, b) => a.localeCompare(b));
        if (!sorted.length) {
          container.innerHTML =
            '<span style="color:#6a6a6a;font-size:13px">No tags available</span>';
          return;
        }
        container.innerHTML = sorted
          .map(
            (t) =>
              `<button class="tag-pill-toggle ${assigned.includes(t) ? "selected" : ""}" onclick="toggleStockTag('${t}')">${t}</button>`
          )
          .join("");
      }

      async function toggleStockTag(tag) {
        const assigned = stockTags[editingSymbol] || [];
        const isAssigned = assigned.includes(tag);
        const prev = [...assigned];

        // Optimistic update
        stockTags[editingSymbol] = isAssigned
          ? assigned.filter((t) => t !== tag)
          : [...assigned, tag];
        persistTagsCache();
        renderAssignPills();
        renderTagFilterRow();
        renderTable();

        try {
          const res = await fetch("/api/stock-tags", {
            method: isAssigned ? "DELETE" : "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ symbol: editingSymbol, tag })
          });
          if (!res.ok) throw new Error("Failed to update tag assignment");
        } catch (e) {
          stockTags[editingSymbol] = prev;
          persistTagsCache();
          renderAssignPills();
          renderTagFilterRow();
          renderTable();
          showToast(e.message);
        }
      }

      function closeAssignModal() {
        document.getElementById("assign-modal").classList.remove("open");
        editingSymbol = null;
        focusSearch();
      }

      document.getElementById("assign-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("assign-modal"))
          closeAssignModal();
      });

      // ── Modal: Add tag ────────────────────────────────
      function openAddTagModal() {
        addTagModalOpen = true;
        document.getElementById("new-tag-input").value = "";
        document.getElementById("addtag-modal").classList.add("open");
        renderTagFilterRow();
        setTimeout(() => document.getElementById("new-tag-input").focus(), 50);
      }

      async function createTag() {
        const inp = document.getElementById("new-tag-input");
        const val = inp.value.trim();
        if (!val || globalTags.includes(val)) {
          inp.value = "";
          return;
        }

        // Optimistic update
        globalTags.push(val);
        persistTagsCache();
        inp.value = "";
        renderTagFilterRow();
        closeAddTagModal();

        try {
          const res = await fetch("/api/tags", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: val })
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || "Failed to create tag");
          }
        } catch (e) {
          globalTags = globalTags.filter((t) => t !== val);
          persistTagsCache();
          renderTagFilterRow();
          showToast(e.message);
        }
      }

      function closeAddTagModal() {
        addTagModalOpen = false;
        document.getElementById("addtag-modal").classList.remove("open");
        renderTagFilterRow();
        focusSearch();
      }

      document.getElementById("addtag-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("addtag-modal"))
          closeAddTagModal();
      });

      // ── Modal: Rename tag ─────────────────────────────
      let renamingTag = null;

      function renameTag(tag) {
        renamingTag = tag;
        const inp = document.getElementById("rename-tag-input");
        inp.value = tag;
        document.getElementById("renametag-modal").classList.add("open");
        setTimeout(() => {
          inp.focus();
          inp.select();
        }, 50);
      }

      async function confirmRenameTag() {
        const inp = document.getElementById("rename-tag-input");
        const newName = inp.value.trim();
        if (!newName || newName === renamingTag) {
          closeRenameTagModal();
          return;
        }
        if (globalTags.includes(newName)) {
          alert("A tag with this name already exists.");
          return;
        }

        const oldName = renamingTag;
        const prevTags = [...globalTags];
        const prevStock = JSON.parse(JSON.stringify(stockTags));
        const prevFilters = new Set(activeTagFilters);

        // Optimistic update
        globalTags = globalTags.map((t) => (t === oldName ? newName : t));
        Object.keys(stockTags).forEach((sym) => {
          stockTags[sym] = stockTags[sym].map((t) =>
            t === oldName ? newName : t
          );
        });
        if (activeTagFilters.has(oldName)) {
          activeTagFilters.delete(oldName);
          activeTagFilters.add(newName);
        }
        persistTagsCache();
        renderTagFilterRow();
        renderTable();
        closeRenameTagModal();

        try {
          const res = await fetch("/api/tags/" + encodeURIComponent(oldName), {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ newName })
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || "Failed to rename tag");
          }
        } catch (e) {
          globalTags = prevTags;
          stockTags = prevStock;
          activeTagFilters = prevFilters;
          persistTagsCache();
          renderTagFilterRow();
          renderTable();
          showToast(e.message);
        }
      }

      function closeRenameTagModal() {
        document.getElementById("renametag-modal").classList.remove("open");
        renamingTag = null;
        focusSearch();
      }

      document
        .getElementById("renametag-modal")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("renametag-modal"))
            closeRenameTagModal();
        });

      // ── Delete tag ────────────────────────────────────
      let pendingDeleteTag = null;

      function deleteTag(tag) {
        pendingDeleteTag = tag;
        document.getElementById("delete-confirm-text").textContent =
          `Delete tag "${tag}"?`;
        document.getElementById("delete-confirm-modal").classList.add("open");
        setTimeout(
          () => document.getElementById("delete-confirm-btn").focus(),
          50
        );
      }

      function closeDeleteConfirmModal() {
        document
          .getElementById("delete-confirm-modal")
          .classList.remove("open");
        pendingDeleteTag = null;
        focusSearch();
      }

      document
        .getElementById("delete-confirm-modal")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("delete-confirm-modal"))
            closeDeleteConfirmModal();
        });

      async function confirmDeleteTag() {
        const tag = pendingDeleteTag;
        closeDeleteConfirmModal();
        if (!tag) return;

        const prevTags = [...globalTags];
        const prevStock = JSON.parse(JSON.stringify(stockTags));
        const wasActive = activeTagFilters.has(tag);

        // Optimistic update
        globalTags = globalTags.filter((t) => t !== tag);
        Object.keys(stockTags).forEach((sym) => {
          stockTags[sym] = stockTags[sym].filter((t) => t !== tag);
        });
        activeTagFilters.delete(tag);
        persistTagsCache();
        if (editingSymbol) renderAssignPills();
        renderTagFilterRow();
        renderTable();

        try {
          const res = await fetch("/api/tags/" + encodeURIComponent(tag), {
            method: "DELETE"
          });
          if (!res.ok) throw new Error("Failed to delete tag");
        } catch (e) {
          globalTags = prevTags;
          stockTags = prevStock;
          if (wasActive) activeTagFilters.add(tag);
          persistTagsCache();
          if (editingSymbol) renderAssignPills();
          renderTagFilterRow();
          renderTable();
          showToast(e.message);
        }
      }

      // ── Focus management ──────────────────────────────
      function isAnyModalOpen() {
        return [
          "assign-modal",
          "addtag-modal",
          "renametag-modal",
          "delete-confirm-modal"
        ].some((id) => document.getElementById(id).classList.contains("open"));
      }

      function focusSearch() {
        if (isAnyModalOpen()) return;
        if (window.getSelection()?.toString().length > 0) return;
        const el = document.getElementById("search");
        if (el && document.activeElement !== el) el.focus();
      }

      document.addEventListener("dblclick", (e) => {
        if (isAnyModalOpen()) return;
        resetFilters();
      });

      document.addEventListener("click", (e) => {
        const inAnyModal = e.target.closest(".modal-overlay");
        if (!inAnyModal) focusSearch();

        if (editModeOn) {
          const isEditAction = e.target.closest(
            '[onclick^="renameTag"], [onclick^="deleteTag"], [onclick^="toggleEditMode"]'
          );
          const isTagPill = e.target.closest(
            "#tag-filters span, #tag-actions span"
          );
          if (!isEditAction && !inAnyModal && !isTagPill) {
            editModeOn = false;
            renderTagFilterRow();
          }
        }
      });

      // ── Init ──────────────────────────────────────────
      setStatus(true); // show clock immediately before first fetch
      if (loadTagsFromCache()) renderTagFilterRow();
      renderTable();
      setInterval(fetchHoldings, 5000);
      (async () => {
        fetchHoldings();
        await loadTagsFromServer();
        renderTagFilterRow();
        renderTable();
        focusSearch();
      })().catch(console.error);
    </script>
  </body>
</html>
