<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zerodha Dashboard</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111111;
        color: #d4d4d4;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        font-variant-numeric: tabular-nums;
      }

      .header {
        background: #111111;
        border-bottom: 1px solid #4a4a4a;
        padding: 14px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo h1 {
        font-size: 17px;
        font-weight: 600;
        color: #e8e8e8;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .updated {
        font-size: 12px;
        color: #ffffff;
        background: #1a1a1a;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #4a4a4a;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
      }
      .dot-live {
        background: #4caf50;
        animation: pulse 2s infinite;
      }
      .dot-err {
        background: #f44336;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: #111111;
        border-bottom: 1px solid #4a4a4a;
      }
      .stat {
        padding: 18px 24px;
        border-right: 1px solid #4a4a4a;
      }
      .stat:last-child {
        border-right: none;
      }
      .stat .lbl {
        font-size: 12px;
        color: #8a8a8a;
        margin-bottom: 8px;
      }
      .val {
        font-size: 26px;
        font-weight: 500;
        color: #e8e8e8;
        line-height: 1;
        display: flex;
        align-items: baseline;
      }
      .val .dec {
        font-size: 14px;
        font-weight: 400;
        color: #8a8a8a;
      }
      .val-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        margin-top: 2px;
      }
      .pct-badge {
        font-size: 12px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 4px;
        align-self: flex-end;
      }
      .pct-g {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
      }
      .pct-r {
        background: rgba(244, 67, 54, 0.15);
        color: #f44336;
      }
      .g {
        color: #4caf50;
      }
      .r {
        color: #f44336;
      }

      .table-container {
        margin: 16px 28px 20px;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .search-box {
        flex: 1 1 auto;
        min-width: 200px;
        position: relative;
      }
      .search-box input {
        width: 100%;
        padding: 8px 12px 8px 34px;
        border: 1px solid #4a4a4a;
        border-radius: 8px;
        font-size: 13px;
        background: #161616;
        color: #d4d4d4;
        outline: none;
        font-family: inherit;
      }
      .search-box input::placeholder {
        color: #6a6a6a;
      }
      .search-box input:focus {
        border-color: #387ed1;
        box-shadow: 0 0 0 3px rgba(56, 126, 209, 0.15);
      }
      .search-box svg {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #6a6a6a;
      }
      .count-badge {
        font-size: 12px;
        color: #6a6a6a;
        white-space: nowrap;
        min-width: 110px;
        text-align: right;
        flex-shrink: 0;
      }

      .filter-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 12px;
        align-items: center;
        min-height: 28px;
      }
      .filter-label {
        font-size: 13px;
        color: #8a8a8a;
        font-weight: 400;
        margin-right: 4px;
      }
      .chip {
        font-size: 13px;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #4a4a4a;
        background: #161616;
        color: #b0b0b0;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .chip:hover {
        border-color: #5b8def;
        color: #5b8def;
      }
      .chip.active {
        background: #2d5fc4;
        border-color: #2d5fc4;
        color: #fff;
      }
      .chip.add-tag-chip {
        border-style: dashed;
        color: #b0b0b0;
        border-color: #5a5a5a;
      }
      .chip.add-tag-chip:hover {
        border-color: #5b8def;
        color: #5b8def;
      }
      .chip.edit-toggle-chip {
        color: #b0b0b0;
      }
      .chip.edit-toggle-chip:hover {
        color: #5b8def;
      }
      .chip.edit-toggle-chip.active {
        background: #2d5fc4;
        color: #fff;
      }
      .grouped-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 6px 14px;
        cursor: pointer;
        user-select: none;
        font-size: 13px;
      }

      .table-wrap {
        background: #111111;
        border-radius: 12px;
        border: 1px solid #4a4a4a;
        overflow: hidden;
      }
      .table-scroll {
        overflow-y: scroll;
        max-height: 400px;
        overflow-x: auto;
        scrollbar-gutter: stable;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead {
        position: sticky;
        top: 0;
        z-index: 10;
      }
      th {
        padding: 11px 14px;
        text-align: left;
        font-size: 11px;
        font-weight: 500;
        color: #8a8a8a;
        text-transform: none;
        letter-spacing: 0;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
        background: #111111;
        border-bottom: 1px solid #4a4a4a;
      }
      th:hover {
        color: #c0c0c0;
      }
      th .si {
        display: inline-block;
        width: 14px;
        margin-left: 4px;
        font-size: 9px;
        opacity: 0.35;
        text-align: center;
      }
      th.asc .si,
      th.desc .si {
        opacity: 1;
        color: #5b8def;
      }
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #3a3a3a;
        white-space: nowrap;
        color: #d4d4d4;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: #161616;
      }
      tbody tr {
        cursor: pointer;
      }
      .sym {
        font-weight: 500;
        color: #e8e8e8;
      }
      .pos {
        color: #4caf50;
        font-weight: 400;
      }
      .neg {
        color: #f44336;
        font-weight: 400;
      }
      .pp {
        color: #4caf50;
        font-weight: 500;
      }
      .pn {
        color: #f44336;
        font-weight: 500;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #161616;
        border: 1px solid #4a4a4a;
        border-radius: 14px;
        padding: 8px 12px 12px 12px;
        width: 400px;
        max-width: 95vw;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .modal-header h3 {
        font-size: 15px;
        font-weight: 600;
        color: #e8e8e8;
      }
      .modal-close {
        font-size: 26px;
        color: #6a6a6a;
        cursor: pointer;
        line-height: 1;
      }
      .modal-close:hover {
        color: #b0b0b0;
      }
      .tag-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag-pill-toggle {
        font-size: 12px;
        padding: 5px 13px;
        border-radius: 20px;
        border: 1.5px solid #4a4a4a;
        background: #1a1a1a;
        color: #b0b0b0;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
        font-family: inherit;
        font-weight: 500;
      }
      .tag-pill-toggle:hover {
        border-color: #5b8def;
        color: #5b8def;
      }
      .tag-pill-toggle.selected {
        background: #2d5fc4;
        border-color: #2d5fc4;
        color: #fff;
      }
      .add-tag-row {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }
      .add-tag-row input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #4a4a4a;
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        color: #d4d4d4;
        background: #1a1a1a;
      }
      .add-tag-row input::placeholder {
        color: #6a6a6a;
      }
      .add-tag-row input:focus {
        border-color: #2d5fc4;
        box-shadow: 0 0 0 3px rgba(45, 95, 196, 0.15);
      }
      .btn-add {
        padding: 8px 16px;
        background: #2d5fc4;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 400;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      .btn-add:hover {
        background: #244ea0;
      }

      ::-webkit-scrollbar {
        height: 6px;
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #111111;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2a2a;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a3a3a;
      }

      @media (max-width: 700px) {
        .summary {
          grid-template-columns: 1fr 1fr;
        }
        .table-container {
          margin: 12px;
        }
        .header {
          padding: 12px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="dashboard">
      <div class="header">
        <div class="logo">
          <img src="favicon.ico" alt="Zerodha Logo" width="32" height="32" />
          <h1>Zerodha Dashboard</h1>
        </div>
        <div
          class="search-box"
          style="max-width: 600px; margin: 0 16px; flex: 1"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            type="text"
            id="search"
            placeholder="Search by symbol or tag"
            oninput="renderTable()"
          />
        </div>
        <div class="header-right">
          <div class="updated" id="ts">
            <span class="status-dot dot-live" id="sdot"></span>Live&nbsp;<span
              style="
                font-size: 32px;
                line-height: 0;
                vertical-align: middle;
                position: relative;
                top: -0.5px;
              "
              >·</span
            >&nbsp;<span id="ts-text"></span>
          </div>
        </div>
      </div>

      <div class="summary">
        <div class="stat">
          <div class="lbl">Total Investment</div>
          <div class="val-row"><div class="val" id="inv">—</div></div>
        </div>
        <div class="stat">
          <div class="lbl">Current Value</div>
          <div class="val-row"><div class="val" id="cur">—</div></div>
        </div>
        <div class="stat">
          <div class="lbl">Day's P&amp;L</div>
          <div class="val-row">
            <div class="val" id="tdc">—</div>
            <span class="pct-badge" id="tdc-pct"></span>
          </div>
        </div>
        <div class="stat">
          <div class="lbl">Total P&amp;L</div>
          <div class="val-row">
            <div class="val" id="pnl">—</div>
            <span class="pct-badge" id="pnl-pct"></span>
          </div>
        </div>
      </div>

      <div class="table-container">
        <div class="filter-row" id="tag-filters"></div>

        <div class="table-wrap">
          <div class="table-scroll">
            <table>
              <thead id="th"></thead>
              <tbody id="tb"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Assign tags modal (row click) -->
    <div class="modal-overlay" id="assign-modal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="assign-modal-title">Assign Tags</h3>
          <span class="modal-close" onclick="closeAssignModal()">×</span>
        </div>
        <div class="tag-pills" id="assign-tag-pills"></div>
      </div>
    </div>

    <!-- Add tag modal (filter row) -->
    <div class="modal-overlay" id="addtag-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Add New Tag</h3>
          <span class="modal-close" onclick="closeAddTagModal()">×</span>
        </div>
        <div class="add-tag-row">
          <input
            type="text"
            id="new-tag-input"
            placeholder="Tag name…"
            onkeydown="if (event.key === 'Enter') createTag();"
          />
          <button class="btn-add" onclick="createTag()">Add</button>
        </div>
      </div>
    </div>

    <!-- Rename tag modal -->
    <div class="modal-overlay" id="renametag-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Rename Tag</h3>
          <span class="modal-close" onclick="closeRenameTagModal()">×</span>
        </div>
        <div class="add-tag-row">
          <input
            type="text"
            id="rename-tag-input"
            placeholder="New tag name…"
            onkeydown="if (event.key === 'Enter') confirmRenameTag();"
          />
          <button class="btn-add" onclick="confirmRenameTag()">Rename</button>
        </div>
      </div>
    </div>

    <script>
      let H = [],
        refreshTimer = null,
        sCol = null,
        sDir = 0;
      let activeTagFilters = new Set();
      let autoTagFilters = new Set(); // tags activated automatically via search match
      let editingSymbol = null;
      let editModeOn = false;

      let globalTags = [];
      let stockTags = {};

      async function loadTagsFromServer() {
        try {
          const res = await fetch("/api/tags");
          const data = await res.json();
          globalTags = (data.tags || []).map((t) => t.name);
          stockTags = data.stockTags || {};
        } catch (e) {
          console.log("Failed to load tags from server", e);
        }
      }

      let lastTagFilterSignature = "";
      function tagFilterRowSignatureChanged() {
        const sorted = [...globalTags].sort((a, b) => a.localeCompare(b));
        const sig = JSON.stringify({
          tags: sorted,
          counts: sorted.map(
            (t) =>
              Object.values(stockTags).filter((arr) => arr.includes(t)).length
          ),
          active: [...activeTagFilters].sort(),
          editMode: editModeOn
        });
        if (sig !== lastTagFilterSignature) {
          lastTagFilterSignature = sig;
          return true;
        }
        return false;
      }

      // ── Kite API ──────────────────────────────────────
      async function fetchHoldings() {
        try {
          const res = await fetch(
            "https://itzbkp-zerodha-dashboard.vercel.app/portfolio/holdings"
          );
          const json = await res.json();
          if (json.status === "Login-Required") {
            setStatus(false);
            const t = window.open("/login", "_blank");
            setTimeout(() => {
              t.close();
              fetchHoldings();
            }, 2000);
            return;
          }
          const raw = json.data || [];
          H = raw.map((h) => ({
            ...h,
            _inv: h.quantity * h.average_price,
            _cur: h.quantity * h.last_price,
            _ret: ((h.last_price - h.average_price) / h.average_price) * 100
          }));
          setStatus(true);
          renderSummary();
          if (tagFilterRowSignatureChanged()) renderTagFilterRow();
          renderTable();
        } catch (e) {
          setStatus(false);
        }
      }

      function setStatus(ok) {
        const dot = document.getElementById("sdot");
        if (dot) dot.className = "status-dot " + (ok ? "dot-live" : "dot-err");
        const d = new Date(),
          h = d.getHours() % 12 || 12,
          m = d.getMinutes(),
          s = d.getSeconds(),
          ap = d.getHours() >= 12 ? "PM" : "AM";
        const ts = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")} ${ap}`;
        const tsText = document.getElementById("ts-text");
        if (tsText) tsText.textContent = ts;
        const updatedEl = document.querySelector(".updated");
        if (updatedEl) {
          updatedEl.innerHTML = `<span class="status-dot ${ok ? "dot-live" : "dot-err"}" id="sdot"></span>${ok ? "Live" : "Error"}&nbsp;<span style="font-size:32px;line-height:0;vertical-align:middle;position:relative;top:-0.5px">·</span>&nbsp;<span id="ts-text">${ts}</span>`;
        }
      }

      // Show current time immediately on load, before first fetch completes
      (function initialTime() {
        const d = new Date(),
          h = d.getHours() % 12 || 12,
          m = d.getMinutes(),
          s = d.getSeconds(),
          ap = d.getHours() >= 12 ? "PM" : "AM";
        const ts = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")} ${ap}`;
        const tsText = document.getElementById("ts-text");
        if (tsText) tsText.textContent = ts;
      })();

      refreshTimer = setInterval(fetchHoldings, 5000);
      (async function init() {
        await loadTagsFromServer();
        renderTagFilterRow();
        fetchHoldings();
      })();

      // ── Formatting ────────────────────────────────────
      function fmtVal(n) {
        const s = Math.abs(n).toFixed(2).split(".");
        return `<span>${Number(s[0]).toLocaleString("en-IN")}</span><span class="dec">.${s[1]}</span>`;
      }
      const fc = (n) =>
        Math.abs(n).toLocaleString("en-IN", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      const fi = (n) => Math.round(Math.abs(n)).toLocaleString("en-IN");

      // ── Summary ───────────────────────────────────────
      function renderSummary() {
        let ti = 0,
          tc = 0,
          tdc = 0,
          tp = 0;
        H.forEach((h) => {
          ti += h._inv;
          tc += h._cur;
          tdc += h.day_change * h.quantity;
          tp += h.pnl;
        });
        const pp = (tp / ti) * 100,
          dcPct = (tdc / ti) * 100;
        document.getElementById("inv").innerHTML = fmtVal(ti);
        document.getElementById("cur").innerHTML = fmtVal(tc);
        const tdcEl = document.getElementById("tdc");
        tdcEl.innerHTML = (tdc < 0 ? "-" : "") + fmtVal(tdc);
        tdcEl.className = "val " + (tdc >= 0 ? "g" : "r");
        const tdcB = document.getElementById("tdc-pct");
        tdcB.textContent = (dcPct >= 0 ? "+" : "") + dcPct.toFixed(2) + "%";
        tdcB.className = "pct-badge " + (tdc >= 0 ? "pct-g" : "pct-r");
        const pe = document.getElementById("pnl");
        pe.innerHTML = (tp < 0 ? "-" : "") + fmtVal(tp);
        pe.className = "val " + (tp >= 0 ? "g" : "r");
        const pb = document.getElementById("pnl-pct");
        pb.textContent = (pp >= 0 ? "+" : "") + pp.toFixed(2) + "%";
        pb.className = "pct-badge " + (tp >= 0 ? "pct-g" : "pct-r");
      }

      // ── Tag filter row ────────────────────────────────
      function renderTagFilterRow() {
        const sorted = [...globalTags].sort((a, b) => a.localeCompare(b));
        const row = document.getElementById("tag-filters");
        let html = "";
        sorted.forEach((t) => {
          const count = Object.values(stockTags).filter((arr) =>
            arr.includes(t)
          ).length;
          const active = activeTagFilters.has(t);
          const borderColor = active ? "#2d5fc4" : "#2a2a2a";
          const bg = active ? "#2d5fc4" : "#161616";
          const color = active ? "#fff" : "#b0b0b0";
          const dividerColor = active ? "rgba(255,255,255,.3)" : "#2a2a2a";
          const xColor = active ? "rgba(255,255,255,.7)" : "#6a6a6a";
          html += `<span style="display:inline-flex;align-items:stretch;border-radius:20px;border:1px solid ${borderColor};overflow:hidden;background:${bg}">`;
          html += `<span style="padding:5px 12px;font-size:13px;color:${color};white-space:nowrap;cursor:${editModeOn ? "default" : "pointer"};display:flex;align-items:center" ${editModeOn ? "" : `onclick="toggleTagFilter('${t}')"`}>${t}</span>`;
          if (!editModeOn) {
            const countHoverAttrs = active
              ? ""
              : `onmouseover="this.style.background='rgba(255,193,7,.15)';this.style.color='#ffc107'" onmouseout="this.style.background='transparent';this.style.color='${color}'"`;
            html += `<span style="padding:5px 12px;font-size:13px;color:${color};cursor:pointer;white-space:nowrap;border-left:1px solid ${dividerColor};transition:all .15s" onclick="toggleTagFilter('${t}')" ${countHoverAttrs}>${count}</span>`;
          }
          if (editModeOn) {
            html += `<span onclick="renameTag('${t}')" title="Rename tag" style="display:flex;align-items:center;justify-content:center;padding:0 10px;border-left:1px solid ${dividerColor};color:${xColor};cursor:pointer;transition:all .15s" onmouseover="this.style.color='#5b8def';this.style.background='rgba(91,141,239,.15)'" onmouseout="this.style.color='${xColor}';this.style.background='transparent'"><span style="font-size:13px;line-height:0;position:relative;top:0px">✎</span></span>`;
            const xHoverAttrs = active
              ? ""
              : `onmouseover="this.style.color='#f44336';this.style.background='rgba(244,67,54,.15)'" onmouseout="this.style.color='${xColor}';this.style.background='transparent'"`;
            html += `<span onclick="deleteTag('${t}')" style="display:flex;align-items:center;justify-content:center;padding:0 10px;border-left:1px solid ${dividerColor};color:${xColor};cursor:pointer;transition:all .15s" ${xHoverAttrs}><span style="font-size:19px;line-height:0;position:relative;top:-1px">×</span></span>`;
          }
          html += `</span>`;
        });
        html += `<span style="display:inline-flex;align-items:stretch;border-radius:20px;overflow:hidden;border:1px solid #2a2a2a">`;
        html += `<span class="chip add-tag-chip grouped-chip" style="border:none;border-radius:0" onclick="openAddTagModal()"><span style="font-size:22px;line-height:0;position:relative;top:-2px">+</span><span>Add</span></span>`;
        html += `<span class="chip edit-toggle-chip grouped-chip ${editModeOn ? "active" : ""}" style="border:none;border-left:1px solid #2a2a2a;border-radius:0" onclick="toggleEditMode()" title="Toggle edit mode"><span style="font-size:13px;line-height:0;position:relative;top:-1px">✎</span><span>Edit</span></span>`;
        html += `<span class="chip edit-toggle-chip grouped-chip" style="border:none;border-left:1px solid #4a4a4a;border-radius:0" onclick="resetFilters()" title="Clear filters and search"><span style="font-size:18px;line-height:0;position:relative;top:-1px">↺</span><span>Reset</span></span>`;
        html += `</span>`;
        row.innerHTML = html;
      }

      function resetFilters() {
        activeTagFilters.clear();
        autoTagFilters.clear();
        const searchEl = document.getElementById("search");
        if (searchEl) searchEl.value = "";
        renderTagFilterRow();
        renderTable();
        focusSearch();
      }

      function toggleEditMode() {
        editModeOn = !editModeOn;
        renderTagFilterRow();
      }

      function toggleTagFilter(t) {
        activeTagFilters.has(t)
          ? activeTagFilters.delete(t)
          : activeTagFilters.add(t);
        autoTagFilters.delete(t);
        const searchEl = document.getElementById("search");
        if (searchEl) searchEl.value = "";
        renderTagFilterRow();
        renderTable();
        focusSearch();
      }

      // ── Table ─────────────────────────────────────────
      const COLS = [
        {
          k: "tradingsymbol",
          l: "Symbol",
          str: true,
          fmt: (v) => `<span class="sym">${v}</span>`
        },
        { k: "quantity", l: "Qty.", num: true, fmt: (v) => v },
        { k: "average_price", l: "Avg. cost", num: true, fmt: (v) => fc(v) },
        { k: "_inv", l: "Invested", num: true, fmt: (v) => fi(v) },
        {
          k: "last_price",
          l: "LTP",
          num: true,
          fmt: (v, r) =>
            `<span class="${r.day_change >= 0 ? "pos" : "neg"}">${fc(v)}</span>`
        },
        {
          k: "day_change",
          l: "Day chg.",
          num: true,
          fmt: (v, r) =>
            `<span class="${v >= 0 ? "pos" : "neg"}">${v >= 0 ? "+" : ""}${r.day_change_percentage.toFixed(2)}%</span>`
        },
        {
          k: "pnl",
          l: "P&L",
          num: true,
          fmt: (v) =>
            `<span class="${v >= 0 ? "pp" : "pn"}">${v >= 0 ? "+" : "-"}${fi(v)}</span>`
        },
        {
          k: "_ret",
          l: "Net chg.",
          num: true,
          fmt: (v) =>
            `<span class="${v >= 0 ? "pos" : "neg"}">${Math.abs(v).toFixed(2)}%</span>`
        }
      ];

      function cycleSort(k) {
        if (sCol !== k) {
          sCol = k;
          sDir = 1;
        } else if (sDir === 1) sDir = -1;
        else {
          sCol = null;
          sDir = 0;
        }
        renderTable();
      }

      function sortVal(row, key) {
        if (key === "_ret") return Math.abs(row[key]);
        return row[key];
      }

      // Render tag filters and empty table shell immediately, before first API call
      renderTagFilterRow();
      renderTable();

      function renderTable() {
        const rawQ =
          (document.getElementById("search") || {}).value
            ?.toLowerCase()
            .trim() || "";
        const queries = rawQ
          .split(",")
          .map((s) => s.replace(/\s+/g, ""))
          .filter(Boolean);

        // Auto-select tag filters whose name starts with any comma-separated query term
        const matchedTags = queries.length
          ? new Set(
              globalTags.filter((t) =>
                queries.some((q) =>
                  t.toLowerCase().replace(/\s+/g, "").startsWith(q)
                )
              )
            )
          : new Set();
        let filtersChanged = false;

        // Remove previously auto-added tags that no longer match
        autoTagFilters.forEach((t) => {
          if (!matchedTags.has(t)) {
            activeTagFilters.delete(t);
            autoTagFilters.delete(t);
            filtersChanged = true;
          }
        });
        // Add newly matched tags
        matchedTags.forEach((t) => {
          if (!activeTagFilters.has(t)) {
            activeTagFilters.add(t);
            autoTagFilters.add(t);
            filtersChanged = true;
          } else if (!autoTagFilters.has(t)) {
            autoTagFilters.add(t);
          }
        });

        if (filtersChanged) renderTagFilterRow();

        let data = H.filter((h) => {
          if (queries.length) {
            const symLower = h.tradingsymbol.toLowerCase().replace(/\s+/g, "");
            const tags = stockTags[h.tradingsymbol] || [];
            const symMatch = queries.some((q) => symLower.startsWith(q));
            const tagMatch = tags.some((t) =>
              queries.some((q) =>
                t.toLowerCase().replace(/\s+/g, "").startsWith(q)
              )
            );
            if (!symMatch && !tagMatch) return false;
          }
          if (activeTagFilters.size) {
            const t = stockTags[h.tradingsymbol] || [];
            if (![...activeTagFilters].some((f) => t.includes(f))) return false;
          }
          return true;
        });
        if (sCol && sDir !== 0) {
          const col = COLS.find((c) => c.k === sCol);
          data = [...data].sort(
            (a, b) =>
              sDir *
              (col?.str
                ? a[sCol] < b[sCol]
                  ? -1
                  : a[sCol] > b[sCol]
                    ? 1
                    : 0
                : sortVal(a, sCol) - sortVal(b, sCol))
          );
        }
        const icon = (k) =>
          sCol !== k
            ? '<span class="si"></span>'
            : sDir === 1
              ? '<span class="si">▲</span>'
              : '<span class="si">▼</span>';
        const cls = (k) => (sCol === k ? (sDir === 1 ? "asc" : "desc") : "");
        document.getElementById("th").innerHTML =
          "<tr>" +
          COLS.map(
            (c) =>
              `<th class="${cls(c.k)}" onclick="cycleSort('${c.k}')">${c.l}${icon(c.k)}</th>`
          ).join("") +
          "</tr>";
        document.getElementById("tb").innerHTML = data
          .map(
            (h) =>
              `<tr onclick="openAssignModal('${h.tradingsymbol}')">` +
              COLS.map((c) => `<td>${c.fmt(h[c.k], h)}</td>`).join("") +
              `</tr>`
          )
          .join("");
      }

      // ── Assign tags modal ─────────────────────────────
      function openAssignModal(symbol) {
        editingSymbol = symbol;
        document.getElementById("assign-modal-title").textContent = symbol;
        renderAssignPills();
        document.getElementById("assign-modal").classList.add("open");
      }

      function renderAssignPills() {
        const container = document.getElementById("assign-tag-pills");
        const assigned = stockTags[editingSymbol] || [];
        const sorted = [...globalTags].sort((a, b) => a.localeCompare(b));
        if (!sorted.length) {
          container.innerHTML =
            '<span style="color:#6a6a6a;font-size:13px">No tags available</span>';
          return;
        }
        container.innerHTML = sorted
          .map((t) => {
            const sel = assigned.includes(t);
            return `<button class="tag-pill-toggle ${sel ? "selected" : ""}" onclick="toggleStockTag('${t}')">${t}</button>`;
          })
          .join("");
      }

      async function toggleStockTag(tag) {
        const assigned = stockTags[editingSymbol] || [];
        const isAssigned = assigned.includes(tag);
        try {
          if (isAssigned) {
            await fetch("/api/stock-tags", {
              method: "DELETE",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ symbol: editingSymbol, tag })
            });
            stockTags[editingSymbol] = assigned.filter((t) => t !== tag);
          } else {
            await fetch("/api/stock-tags", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ symbol: editingSymbol, tag })
            });
            if (!stockTags[editingSymbol]) stockTags[editingSymbol] = [];
            stockTags[editingSymbol].push(tag);
          }
        } catch (e) {
          console.log("Failed to update stock tag", e);
        }
        renderAssignPills();
        renderTagFilterRow();
        renderTable();
      }

      let renamingTag = null;

      function renameTag(tag) {
        renamingTag = tag;
        const inp = document.getElementById("rename-tag-input");
        inp.value = tag;
        document.getElementById("renametag-modal").classList.add("open");
        setTimeout(() => {
          inp.focus();
          inp.select();
        }, 50);
      }

      async function confirmRenameTag() {
        const inp = document.getElementById("rename-tag-input");
        const newName = inp.value.trim();
        if (!newName || newName === renamingTag) {
          closeRenameTagModal();
          return;
        }
        if (globalTags.includes(newName)) {
          alert("A tag with this name already exists.");
          return;
        }
        try {
          const res = await fetch(
            "/api/tags/" + encodeURIComponent(renamingTag),
            {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ newName })
            }
          );
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert(err.message || "Failed to rename tag");
            return;
          }
        } catch (e) {
          console.log("Failed to rename tag", e);
          return;
        }
        globalTags = globalTags.map((t) => (t === renamingTag ? newName : t));
        Object.keys(stockTags).forEach((sym) => {
          stockTags[sym] = stockTags[sym].map((t) =>
            t === renamingTag ? newName : t
          );
        });
        if (activeTagFilters.has(renamingTag)) {
          activeTagFilters.delete(renamingTag);
          activeTagFilters.add(newName);
        }
        renderTagFilterRow();
        renderTable();
        closeRenameTagModal();
      }

      function closeRenameTagModal() {
        document.getElementById("renametag-modal").classList.remove("open");
        renamingTag = null;
        focusSearch();
      }

      document
        .getElementById("renametag-modal")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("renametag-modal"))
            closeRenameTagModal();
        });

      async function deleteTag(tag) {
        if (!confirm(`Delete tag "${tag}"?`)) return;
        try {
          await fetch("/api/tags/" + encodeURIComponent(tag), {
            method: "DELETE"
          });
        } catch (e) {
          console.log("Failed to delete tag", e);
        }
        globalTags = globalTags.filter((t) => t !== tag);
        Object.keys(stockTags).forEach((sym) => {
          stockTags[sym] = stockTags[sym].filter((t) => t !== tag);
        });
        activeTagFilters.delete(tag);
        renderAssignPills();
        renderTagFilterRow();
        renderTable();
      }

      function closeAssignModal() {
        document.getElementById("assign-modal").classList.remove("open");
        editingSymbol = null;
        focusSearch();
      }

      document.getElementById("assign-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("assign-modal"))
          closeAssignModal();
      });

      // ── Add tag modal ─────────────────────────────────
      function openAddTagModal() {
        document.getElementById("new-tag-input").value = "";
        document.getElementById("addtag-modal").classList.add("open");
        setTimeout(() => document.getElementById("new-tag-input").focus(), 50);
      }

      async function createTag() {
        const inp = document.getElementById("new-tag-input");
        const val = inp.value.trim();
        if (!val || globalTags.includes(val)) {
          inp.value = "";
          return;
        }
        try {
          const res = await fetch("/api/tags", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: val })
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert(err.message || "Failed to create tag");
            return;
          }
        } catch (e) {
          console.log("Failed to create tag", e);
          return;
        }
        globalTags.push(val);
        inp.value = "";
        renderTagFilterRow();
        closeAddTagModal();
      }

      function closeAddTagModal() {
        document.getElementById("addtag-modal").classList.remove("open");
        focusSearch();
      }

      document.getElementById("addtag-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("addtag-modal"))
          closeAddTagModal();
      });

      // ── Keep focus on search input ────────────────────
      function isAnyModalOpen() {
        return (
          document.getElementById("assign-modal").classList.contains("open") ||
          document.getElementById("addtag-modal").classList.contains("open") ||
          document.getElementById("renametag-modal").classList.contains("open")
        );
      }
      function focusSearch() {
        if (isAnyModalOpen()) return;
        const sel = window.getSelection();
        if (sel && sel.toString().length > 0) return;
        const el = document.getElementById("search");
        if (el && document.activeElement !== el) el.focus();
      }
      document.addEventListener("click", (e) => {
        const inAnyModal = e.target.closest(".modal-overlay");
        const isInteractive = e.target.closest(
          "button, .chip, .tag-pill-toggle, input, span[onclick]"
        );
        if (!inAnyModal && !isInteractive) {
          focusSearch();
        }
        if (editModeOn) {
          const isEditAction = e.target.closest(
            '[onclick^="renameTag"], [onclick^="deleteTag"], [onclick^="toggleEditMode"]'
          );
          const isTagPill = e.target.closest("#tag-filters span");
          if (!isEditAction && !inAnyModal && !isTagPill) {
            editModeOn = false;
            renderTagFilterRow();
          }
        }
      });
      focusSearch();
    </script>
  </body>
</html>
